# ============================================================================
# domain-services — Postgres + MinIO en VPS, accesibles públicamente con TLS.
#
# Arquitectura:
#   [ laptop dev ] --TCP/5432 TLS--> [ Postgres ]
#                  --HTTP/9000 TLS--> [ MinIO API ]
#                  --HTTP/9001 ----->  [ MinIO Console UI ]
#
# Sin domain server local — domain corre en la laptop del dev.
# Sin Meilisearch (afuera del scope por ahora).
# Sin Caddy/dominio — acceso por IP del VPS con certs self-signed.
# ============================================================================

services:

  postgres:
    image: pgvector/pgvector:${PG_VERSION:-pg16}
    container_name: domain-postgres
    restart: unless-stopped
    profiles: [all, core, postgres]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      # PG escucha en 0.0.0.0 porque queremos acceso externo (asumido por el user).
      # TLS y password fuerte son la única defensa — ver README.md sección seguridad.
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./certs/postgres:/etc/postgresql/certs:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: domain-minio
    restart: unless-stopped
    profiles: [all, core, minio]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: http://${VPS_PUBLIC_IP:-localhost}:${MINIO_CONSOLE_PORT:-9001}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
      - ./certs/minio:/root/.minio/certs:ro
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Bootstrap one-shot: crea el bucket inicial via mc.
  # Se corre, crea/asegura el bucket, y muere. Idempotente.
  minio-bootstrap:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: domain-minio-bootstrap
    profiles: [all, core, minio]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-domain-attachments}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set --insecure local https://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --insecure --ignore-existing local/"$$MINIO_DEFAULT_BUCKET"
        echo "MinIO bootstrap OK: bucket $$MINIO_DEFAULT_BUCKET listo"
    restart: "no"

volumes:
  postgres_data:
    name: domain_postgres_data
  minio_data:
    name: domain_minio_data
