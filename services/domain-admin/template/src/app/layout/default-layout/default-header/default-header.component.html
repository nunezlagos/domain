<c-header class="mb-4 d-print-none" position="sticky">
  <c-container [fluid]="true" class="border-bottom px-4 d-flex align-items-center">
    <button
      [cSidebarToggle]="sidebarId()"
      cHeaderToggler
      class="btn"
      toggle="visible"
      style="margin-inline-start: -14px;"
      aria-label="Toggle sidebar navigation"
    >
      <svg cIcon name="cilMenu" size="lg"></svg>
    </button>

    <div class="flex-grow-1"></div>

    <c-header-nav class="d-flex align-items-center gap-2">

      <!-- HU-41.1: org selector (solo super_admin) -->
      <c-nav-item *ngIf="isSuperAdmin()">
        <select
          class="form-select form-select-sm header-org-select"
          [value]="activeOrgId() ?? ''"
          (change)="onOrgChange($any($event.target).value)"
          aria-label="Active organization">
          <option value="" disabled>— Org —</option>
          @for (org of availableOrgs(); track org.id) {
            <option [value]="org.id">{{ org.name }}</option>
          }
        </select>
      </c-nav-item>

      <!-- Theme picker (light / dark / auto) -->
      <ng-container *ngTemplateOutlet="themeDropdown" />

      <div class="nav-item py-1 d-none d-md-flex">
        <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
      </div>

      <!-- User avatar + dropdown (al final para que quede a la derecha del todo) -->
      <ng-container *ngTemplateOutlet="userDropdown" />
    </c-header-nav>
  </c-container>

  <c-container [fluid]="true" class="px-4">
    <c-breadcrumb-router />
  </c-container>
</c-header>

<!-- Theme picker dropdown -->
<ng-template #themeDropdown>
  <c-dropdown alignment="end" variant="nav-item">
    <button [caret]="false" cDropdownToggle aria-label="Cambiar tema">
      <svg cIcon [name]="themeIcon()" size="lg"></svg>
    </button>
    <div cDropdownMenu>
      @for (mode of colorModes; track mode.name) {
        <button
          (click)="setTheme(mode.name)"
          [class.active]="colorMode() === mode.name"
          cDropdownItem
          class="d-flex align-items-center">
          <svg cIcon class="me-2" [name]="mode.icon" size="lg"></svg>
          {{ mode.text }}
        </button>
      }
    </div>
  </c-dropdown>
</ng-template>

<!-- User dropdown -->
<ng-template #userDropdown>
  <c-dropdown [popperOptions]="{ placement: 'bottom-end' }" variant="nav-item">
    <button [caret]="true" cDropdownToggle class="py-0" aria-label="Open user menu">
      <c-avatar
        shape="rounded-1"
        size="md"
        [textColor]="'primary'"
        [status]="'success'"
        [alt]="user()?.name ?? 'User'">
        {{ userInitials() }}
      </c-avatar>
    </button>
    <ul cDropdownMenu class="pt-0" style="min-width: 240px;">
      <li>
        <h6 cDropdownHeader class="bg-body-secondary text-body-secondary fw-semibold py-2 rounded-top">
          {{ user()?.name ?? 'Sin sesión' }}
        </h6>
      </li>
      <li>
        <h6 cDropdownHeader class="text-body-secondary small fw-normal py-1 d-flex align-items-center gap-2">
          {{ user()?.email }}
          @if (activeRole(); as r) {
            <span class="badge bg-primary">{{ r.name }}</span>
          }
        </h6>
      </li>
      <li><hr cDropdownDivider /></li>
      <li>
        <a cDropdownItem routerLink="/admin/settings">
          <svg cIcon class="me-2" name="cilSettings"></svg>
          Settings
        </a>
      </li>
      <li><hr cDropdownDivider /></li>
      <li>
        <button cDropdownItem (click)="logout()" type="button">
          <svg cIcon class="me-2" name="cilAccountLogout"></svg>
          Logout
        </button>
      </li>
    </ul>
  </c-dropdown>
</ng-template>
