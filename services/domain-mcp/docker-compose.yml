# Backend deploy VPS: build local + init container migrate.
# Sin GHCR, sin tags. Update: git pull + make build + make restart SVC=backend.

services:

  # Init container: corre `domain migrate up` antes que el server arranque.
  # Sale exit 0 si migraciones aplicaron OK; el backend espera service_completed_successfully.
  domain-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: domain-mcp:local
    container_name: domain-migrate
    command: ["migrate", "up"]
    environment:
      DOMAIN_DATABASE_URL: postgres://${POSTGRES_USER:-domain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-domain}?sslmode=disable
      # guard de backup (DOMAINSERV-39): install.sh lo setea a 1 tras el pg_dump.
      # Sin backup y con BD con datos, migrate aborta (fail-safe).
      DOMAIN_BACKUP_DONE: ${DOMAIN_BACKUP_DONE:-0}
    networks:
      - domain_internal
    restart: "no"

  # Init container: corre `domain seed all` después de las migraciones y
  # antes que el server. Aplica los catálogos globales (platform_policies,
  # project_templates, mcp_providers, skills, agent_templates, flows) de
  # forma idempotente vía seed_versions, así que correrlo en cada `up` es
  # seguro. Usa el MISMO DSN superuser que domain-migrate.
  domain-seed:
    build:
      context: .
      dockerfile: Dockerfile
    image: domain-mcp:local
    container_name: domain-seed
    command: ["seed", "all"]
    environment:
      DOMAIN_DATABASE_URL: postgres://${POSTGRES_USER:-domain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-domain}?sslmode=disable
    depends_on:
      domain-migrate:
        condition: service_completed_successfully
    networks:
      - domain_internal
    restart: "no"

  domain-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: domain-mcp:local
    container_name: domain-mcp
    restart: unless-stopped
    # Depende SOLO de migrate (schema listo). NO de domain-seed: el seed es
    # data de catálogo no-crítica; si falla, el server igual debe arrancar
    # (un seed roto NO debe tirar el backend). El seed corre igual en cada up.
    depends_on:
      domain-migrate:
        condition: service_completed_successfully
    environment:
      DOMAIN_HTTP_PORT: 8000
      DOMAIN_HTTP_BIND: 0.0.0.0
      DOMAIN_DATABASE_URL: postgres://app_user:${APP_USER_PASSWORD}@postgres:5432/${POSTGRES_DB:-domain}?sslmode=disable
      # Auth pool: usa app_admin (BYPASSRLS) para apikey resolver + audit lookups
      # donde aún no se conoce el org_id (caso clásico: validar Bearer antes de
      # saber a qué org pertenece). Sin esto, RLS filtra api_keys y devuelve 401.
      DOMAIN_DATABASE_AUTH_URL: postgres://app_admin:${APP_ADMIN_PASSWORD}@postgres:5432/${POSTGRES_DB:-domain}?sslmode=disable
      # Passphrase de cifrado at-rest de API keys (pgcrypto, mig 000168). DEBE ser
      # identica a la de domain-admin. Sin esto, Issue/Rotate fallan con ErrNoEncKey.
      DOMAIN_FIELD_ENC_KEY: ${DOMAIN_FIELD_ENC_KEY}
      DOMAIN_S3_ENDPOINT: http://minio:9000
      DOMAIN_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      DOMAIN_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      DOMAIN_S3_BUCKET: ${MINIO_DEFAULT_BUCKET:-domain-attachments}
      DOMAIN_S3_REGION: us-east-1
      DOMAIN_S3_FORCE_PATH_STYLE: "true"
      # REQ-70: expone /metrics en :9090 al network domain_internal
      # para que Prometheus pueda scrapear (mismo network).
      DOMAIN_METRICS_ENABLED: "true"
      DOMAIN_METRICS_BIND: "0.0.0.0"
      DOMAIN_METRICS_PORT: "9090"
      # REQ-54: LLM server-side (MiniMax). Sin esto el proceso Go no ve la key
      # y rerank/inferencia-de-aristas/judge + la preparación de contexto
      # degradan silenciosamente. La key vive en services/.env (LLM_API_KEY);
      # el compose de domain-admin ya la pasa, este bloque faltaba.
      # Nombres EXACTOS que lee el código Go (internal/llm/anthropic/minimax.go
      # + cmd/domain/server_services.go): key = LLM_API_KEY→MINIMAX_API_KEY→
      # DOMAIN_MINIMAX_API_KEY; provider default = DOMAIN_LLM_PROVIDER;
      # modelo = LLM_MODEL→MINIMAX_MODEL.
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M3}
      DOMAIN_LLM_PROVIDER: ${LLM_PROVIDER:-minimax}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M3}
      MINIMAX_REGION: ${MINIMAX_REGION:-international}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-}
      DOMAIN_ANTHROPIC_KEY: ${ANTHROPIC_API_KEY:-}
    expose:
      - "8000"
      - "9090"
    networks:
      - domain_internal
    healthcheck:
      test: ["CMD", "/usr/local/bin/domain", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  domain_internal:
    name: domain_internal
    external: true
