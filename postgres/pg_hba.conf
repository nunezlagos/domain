# ============================================================================
# pg_hba.conf — domain-services
#
# Auth rules: solo conexiones TLS desde cualquier IP, SCRAM-SHA-256.
# Sin "trust", sin "password" plaintext, sin "md5" deprecado.
# ============================================================================

# TYPE        DATABASE        USER             ADDRESS         METHOD
# ----------------------------------------------------------------------------

# Local UNIX socket (admin del container, ej. pg_isready healthcheck)
local         all             postgres                         trust

# Conexiones SSL/TLS desde cualquier IP — SCRAM-SHA-256 obligatorio
hostssl       all             all              0.0.0.0/0       scram-sha-256
hostssl       all             all              ::/0            scram-sha-256

# Conexiones sin SSL → rechazadas explícitamente (defensa contra downgrade)
hostnossl     all             all              0.0.0.0/0       reject
hostnossl     all             all              ::/0            reject
