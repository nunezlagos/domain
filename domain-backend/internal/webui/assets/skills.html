<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Domain — Admin Skills</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/admin/style.css">
</head>
<body>
<header>
  <h1>Domain · Admin · Skills</h1>
  <nav>
    <a href="/admin/">Dashboard</a> ·
    <a href="/admin/skills">Skills</a> ·
    <a href="/admin/memories">Memories</a>
  </nav>
</header>

<main>
  <section>
    <input type="search" id="q" placeholder="Filtrar por slug o nombre…">
    <span class="muted" id="count"></span>
  </section>

  <table>
    <thead>
      <tr><th>Slug</th><th>Name</th><th>Source</th><th>Pinned</th><th>Enabled</th><th>Actions</th></tr>
    </thead>
    <tbody id="skills-body"></tbody>
  </table>
</main>

<script>
async function refresh() {
  const q = document.getElementById('q').value;
  const r = await fetch('/admin/api/skills?q=' + encodeURIComponent(q));
  const items = await r.json();
  document.getElementById('count').textContent = items.length + ' skills';
  const body = document.getElementById('skills-body');
  body.innerHTML = '';
  for (const s of items) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><code>${s.slug}</code></td>
      <td>${s.name}</td>
      <td class="muted">${s.source || '-'}</td>
      <td>${s.pinned_version ? `v${s.pinned_version}` : '-'}</td>
      <td>${s.enabled ? '✓' : '✗'}</td>
      <td>
        <button onclick="action('${s.id}','${s.enabled ? 'disable' : 'enable'}')">${s.enabled ? 'Disable' : 'Enable'}</button>
        ${s.pinned_version ? `<button onclick="action('${s.id}','unpin')">Unpin</button>` : ''}
      </td>`;
    body.appendChild(tr);
  }
}
async function action(id, act) {
  const r = await fetch('/admin/api/skills/' + id + '/' + act, { method: 'POST' });
  if (!r.ok) alert('error: ' + r.status);
  refresh();
}
document.getElementById('q').addEventListener('input', refresh);
refresh();
</script>
</body>
</html>
