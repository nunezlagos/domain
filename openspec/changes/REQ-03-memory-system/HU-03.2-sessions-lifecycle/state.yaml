notes: |
  internal/service/session.Service:
  - Start(StartInput): inserta session (started_at=NOW, ended_at NULL), audit
    "session.started". Title required.
  - End(id, actor, summary): tx con SELECT FOR UPDATE, valida no cerrada,
    UPDATE ended_at=NOW + summary, audit "session.ended". ErrAlreadyEnded.
  - GetByID, GetActive(userID, projectID): GetActive devuelve más reciente
    activa filtrada por user + project (uuid.Nil para no filtrar project).
  - List(userID, limit): orden started_at DESC.
  - Session.Status() devuelve "active" | "completed" según EndedAt.

  HTTP handlers:
  - POST   /api/v1/sessions
  - GET    /api/v1/sessions             ?limit=
  - GET    /api/v1/sessions/active      ?project_slug=
  - GET    /api/v1/sessions/{id}
  - POST   /api/v1/sessions/{id}/end

  MCP tools (prefix domain_*):
  - domain_session_start(title, project_slug?, tags?)
  - domain_session_end(session_id, summary?)
  - domain_session_active(project_slug?)

  Tests integration (7 escenarios + 1 sabotaje):
  - Start con title vacío → ErrTitleRequired
  - Status() inicial "active", "completed" tras End
  - GetActive devuelve la sesión iniciada
  - End con summary persiste; GetActive no la devuelve
  - End sobre session ya cerrada → ErrAlreadyEnded
  - List orden started_at DESC
  - sabotaje GetActive con project filter no leak cross-project

  Pending:
  - SearchHybrid sobre summary_tsv (GIN index ya existe en migration 7)
  - Auto-close de sessions inactivas >24h (cron job)
  - HU-03.5 context timeline (cross-entity feed)
