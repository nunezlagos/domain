notes: |
  internal/llm/tokens.Estimate aproxima tokens sin red.

  Heurística: chars(latin)/4 + chars(cjk)/2 + chars(otros)/3.
  Sobreestima ligero (defensa para enforcement). Para precisión usar
  tiktoken futura HU-06.6.

  EstimateMessages suma system_prompt + cada message + overhead role (10).
  ToolCalls suman 20 cada uno (serialization JSON overhead).

  Wiring agent runner:
  - Pre-flight: tokens.EstimateMessages(system_prompt, [user prompt])
  - billing.CheckTokens(orgID, estimated) → si HardLimit → ErrQuotaExceeded
  - Run NO se inicia, agent_run persiste con status=failed + error explicativo
    "quota_exceeded: estimated X tokens would exceed (used Y, limit Z)"

  Tests unit:
  - Estimate empty=0
  - Short latin: 2-4 tokens para "Hola mundo"
  - Long latin proporcional (1150 chars → 200-350 tokens)
  - CJK chars contados como 0.5/token
  - EstimateMessages incluye overhead por message
  - Monotónico: text más largo → más tokens

  Pending HU-07.4 completa:
  - HU-06.6 tiktoken precisión exacta cl100k_base
  - Soft warning al 80% (HU-21.3 SoftLimitHit ya existe — wire en runner)
  - Streaming budget check mid-completion (cancelar stream si excede)
  - Reset diario opcional (vs mensual; HU-21.3 ya implementa mensual)
  - Per-agent budget override (no solo org-level)
