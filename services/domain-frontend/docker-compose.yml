services:
  domain-frontend:
    image: ghcr.io/nunezlagos/domain-frontend:${DOMAIN_FRONTEND_VERSION:-latest}
    container_name: domain-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - domain_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  domain_internal:
    name: domain_internal
    external: true
