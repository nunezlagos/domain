notes: |
  internal/debug.TuneRuntime(logger) log inicial con GOMAXPROCS + NumCPU.

  Go 1.22+ detecta automáticamente cgroup CPU quota → GOMAXPROCS se ajusta
  al límite del container sin intervención. Go 1.25 (versión actual) mantiene
  ese comportamiento.

  GOMEMLIMIT vía env var (Go runtime nativo) si DOMAIN_GOMEMLIMIT seteado
  (no se setea en código — el runtime lo lee del env directamente).

  Helm chart values.yaml recomendado:
    env:
      GOMEMLIMIT: "{{ .Values.resources.limits.memory }}"
      GOMAXPROCS: ""  # vacío = auto-detect cgroup

  Pending:
  - Set GOMEMLIMIT a 80% del cgroup limit automáticamente vía uber-go/automaxprocs
    style helper (mejor: tener nuestro propio sin dep adicional)
  - Métricas Prometheus: go_gomaxprocs gauge + go_memlimit_bytes
  - Hot-reload runtime tuning si env vars cambian (probablemente no necesario)
  - Documentar trade-offs CPU quota vs cores reservados
