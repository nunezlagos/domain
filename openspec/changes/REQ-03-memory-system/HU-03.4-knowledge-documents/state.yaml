notes: |
  Migration 000009 ya creaba knowledge_docs + knowledge_chunks con
  embedding vector(1536) + tsvector content_tsv. Esta tirada implementa el
  service Go encima del schema existente.

  internal/rag/chunker:
  - Chunk(text, Options): recursive character splitting orientado a párrafos
    + frases. MaxChars default 2048, Overlap 200. Boundaries naturales:
    \n\n > \n > ". " > " ". Fallback duro si no encuentra boundary en el
    último 30% del rango.
  - Determinístico: misma entrada → mismos chunks.
  - MinChunkChars=50 evita trailing chunks triviales (fusiona al anterior).
  - Tests unit: 8 escenarios + 1 sabotaje (overlap excesivo clampea sin loop).

  internal/service/knowledge.Service:
  - Save(SaveInput): chunkea body, genera embedding por chunk (Embedder
    inyectado, pre-tx), persiste doc + chunks en tx atómica. Si Embed falla
    NO se crea doc parcial (sabotaje test verificado).
  - Get(id): doc + chunks ordenados por chunk_index ASC
  - SearchHybrid(orgID, query, limit): CTE BM25 + cosine RRF (k=60) sobre
    chunks JOIN docs. Si Embedder es NopEmbedder degrada a tsvector-only.
  - ListByProject(projectID, limit): docs activos (sin chunks)
  - SoftDelete(id): UPDATE deleted_at; chunks CASCADE conservados para audit

  HTTP handlers:
  - POST   /api/v1/knowledge
  - GET    /api/v1/knowledge         ?project_slug=
  - GET    /api/v1/knowledge/search  ?q= &limit=
  - GET    /api/v1/knowledge/{id}
  - DELETE /api/v1/knowledge/{id}

  MCP tools (prefix domain_*):
  - domain_knowledge_save(project_slug, title, body, source?, source_url?, tags?)
  - domain_knowledge_search(query, limit?)
  - domain_knowledge_get(id)

  Tests integration (9 escenarios + 2 sabotaje):
  - Save doc corto → 1 chunk
  - Save doc largo → múltiples chunks con chunk_index secuencial
  - Title required, body required
  - Get devuelve doc + chunks
  - SearchHybrid semantic encuentra match correcto
  - SearchHybrid con NopEmbedder degrada a tsvector
  - ListByProject + SoftDelete
  - sabotaje cross-org search no leak
  - sabotaje Embed failure → doc NO persiste (atomic)

