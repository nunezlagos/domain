notes: |
  Repository interfaces definidas en los 5 packages: observation, session,
  project, agent, flow. Cada uno con:
  - repository.go     → interfaz Repository + Param structs
  - pg_repository.go  → implementación PG (honra txctx para RLS)
  - service.go        → Service depende de Repository via repository() getter;
                        Pool sigue público como DEPRECATED (Strangler Fig)
                        para no romper callers que construyen
                        &Service{Pool: ...} (tests, e2e, runner, handlers).

  Constructor nuevo:
  - observation.NewService(pool, audit, embedder, events, repo)
  - session.NewService(pool, audit, repo)
  - project.NewService(pool, audit, tplSvc, repo)
  - agent.NewService(pool, audit, repo)
  - flow.NewService(pool, audit, repo)

  Wiring actualizado en cmd/domain/main.go y cmd/domain-mcp/main.go a los
  nuevos constructores (pasando repo=nil → se construye pgRepository
  internamente).

  Unit tests con mock Repository: repository_mock_test.go en observation
  (6 escenarios incl. sabotaje/error propagation, sin DB).

  Alcance restringido por scope: en flow/ solo service.go (CRUD + flow_runs)
  se migra; saga.go, signals.go, snapshots.go, state_machine.go, dlq.go,
  heartbeats.go, versioning.go, budget.go, dag.go siguen usando s.Pool
  directo. Esto es Strangler Fig consciente — futuras HUs migrarán esos
  stores.

  Behavior-preserving salvo donde la spec pidió fix explícito. La query
  CloseInactive de session conservó su bug original ($1 cutoff sin usar,
  $2 ya hace doble función ended_at + updated_at filter); migración fiel.
