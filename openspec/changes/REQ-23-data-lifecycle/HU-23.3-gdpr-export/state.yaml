notes: |
  internal/service/lifecycle.Service.ExportUserData(userID, orgID) → UserExport.

  GDPR Art. 15 (right of access) + Art. 20 (data portability) compliant.

  Datos exportados:
  - User record (sin password — no existe en schema)
  - Organization del user (settings, plan, custom_limits)
  - Projects accesibles del org
  - Observations created_by = userID (con content + metadata + tags)
  - Sessions user_id = userID
  - Prompts created_by = userID
  - Knowledge_docs created_by = userID
  - Agent_runs user_id = userID (inputs/outputs/tokens/cost)
  - APIKeys: SOLO metadata (id, name, key_prefix, last_used, expires, revoked,
    created). NUNCA key_hash ni secrets reales.
  - AuditLog actor_id = userID (últimas 5000 entries)

  Output: UserExport JSON estructurado con version=1.0 y exported_at.

  HTTP: GET /api/v1/me/export con Content-Disposition attachment.

  Tests integration (3 escenarios + 2 sabotaje):
  - FullBundle: export incluye user/org/projects/observations
  - sabotaje cross-org orgID → ErrNotFound
  - sabotaje export NO incluye key_hash ni password fields
  - normalizeValue convierte UUIDs binarios a strings + JSONB parsea

  Audit "user.gdpr_exported" registrado con counts.

  Pending:
  - Async job para exports grandes (> 100MB): genera S3 signed URL 24h max
  - Format alternativos (CSV por entity, ZIP con un file por tabla)
  - Right to erasure (Art. 17): DELETE userData + cascade soft-delete →
    HU-23.4 futura (pending diseño)
  - Schedule export periódico (mensual) opt-in para users que lo pidan
