notes: |
  internal/mcp/server/resilience.go ResilientWrapper.

  Funcionalidad:
  - Rate limiter per-tool: token bucket in-memory (window deslizante de 1 min)
    cap calls/minute. Si exceeded → result.IsError "rate limit exceeded".
    Handler NO se invoca (no consume recursos downstream).
  - Retry transient errors: maxRetries con backoff exponencial 100ms→200ms→400ms.
    Detecta transient por substring en error.Error() o result content:
    "connection reset", "broken pipe", "i/o timeout", "temporary failure",
    "timeout", "temporarily", "service unavailable", "503".
  - context.DeadlineExceeded considerado transient.
  - SetBudget(toolName, ToolBudget) per-tool override.

  Wire en mcpserver.Tools(): cada handler wrappeado con ResilientWrapper.
  - defaultBudget: 120 calls/min, 1 retry, 100ms backoff
  - Tools de mutation (mem_save, knowledge_save, session_start/end, agent_run):
    60 calls/min override (más restrictivo)

  Tests unit (5 escenarios + 1 sabotaje):
  - Unlimited budget: 50 calls passan
  - RateLimit: 5/min después rechaza la 6ta sin invocar handler
  - Retry transient ("connection reset") hasta éxito en attempt 3
  - Errores no-transient NO retry (no spam de bad requests)
  - SetBudget per-tool override default
  - sabotaje: window compacts (no leak de timestamps)

  Pending:
  - Persistir rate limit state en Redis para multi-pod (horizontal scale)
  - Métricas Prometheus: domain_mcp_tool_calls_total / rate_limit_total
  - Distinct budget per org (no global) — actualmente shared entre orgs
  - Circuit breaker tipo per-tool (5 fails seguidos → open 30s)
  - Cliente recibe Retry-After header con sugerencia de espera
