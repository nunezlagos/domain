notes: |
  internal/runner/agent.Runner ejecuta agents server-side con tool calling.

  Run(input) flow:
  1. Pre-flight billing.CheckTokens (HU-21.3 quota): si HardLimit → fail
  2. Resolver Provider del factory según agent.Provider field
  3. Cargar skills_slugs como []ToolDef (Name + Description + InputSchema)
  4. Crear agent_run con status=running
  5. Loop while iterations < agent.MaxIterations:
     - Provider.Complete(messages, tools, model, temp, max_tokens)
     - Si finish_reason != tool_use → final, break
     - Si tool_use → ejecutar cada tool.skill (Skills.ValidateInput primero)
     - Append tool result como Message role=tool → siguiente iteración
  6. Persistir tokens + cost + outputs en agent_runs
  7. status=completed | failed (con error registrado)
  8. billing.IncrementTokens + IncrementRuns

  Skill execution actual:
  - prompt: substitute {{var}} → value (impl básica)
  - code/api/mcp_tool: stub que devuelve descripción — runtime real pending HU-05.5

  cmd/domain server + cmd/domain-mcp:
  - Crea llm.Factory leyendo DOMAIN_ANTHROPIC_KEY, DOMAIN_OPENAI_KEY,
    DOMAIN_OLLAMA_HOST. Registra anthropic.New, openai.New, ollama.New.
  - DOMAIN_LLM_PROVIDER default opcional
  - Pasa al Runner y al API/MCP

  HTTP: POST /api/v1/agents/{id}/run con body {input, variables}
  MCP: domain_agent_run(agent_slug, input, variables?)

  Tests integration (5 escenarios + 1 sabotaje) usando stubProvider:
  - BasicCompletion: 1 iter, content devuelto, tokens persistidos
  - ToolCallLoop: 2 iters (call → tool execute → final), skills resueltos
  - FailsIfProviderNotRegistered: agent_run persiste con status=failed sin
    invocar LLM (sin tokens consumidos)
  - MaxIterationsBreak: provider que siempre pide tool → error tras maxIter
  - sabotaje: failed run igualmente se persiste en BD

  Pending:
  - Streaming (HU-08.2.1): CompleteStream → SSE response
  - HU-05.5 skill runtime real (code sandboxed, api HTTP, mcp_tool forward)
  - parent_run_id wire para multi-agent (HU-08.6 supervisor)
  - Cost USD calc (model_registry pending HU-06.4)
  - Cancel agent_run via signal (HU-09.4 retry/cancellation)
  - Persistir messages history para resume conversaciones
