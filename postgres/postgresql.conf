# ============================================================================
# postgresql.conf — domain-services
# Tuneo conservador para VPS single-host con acceso externo + TLS.
# ============================================================================

# --- Listening ---
listen_addresses = '*'           # bind a todas las interfaces (queremos acceso externo)
port = 5432
max_connections = 100

# --- TLS / SSL ---
ssl = on
ssl_cert_file = '/etc/postgresql/certs/server.crt'
ssl_key_file = '/etc/postgresql/certs/server.key'
ssl_min_protocol_version = 'TLSv1.2'
ssl_prefer_server_ciphers = on

# --- Memory ---
shared_buffers = 256MB           # ~25% RAM en VPS pequeño (1-2GB)
effective_cache_size = 1GB
work_mem = 16MB
maintenance_work_mem = 64MB

# --- WAL / Durabilidad ---
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# --- Logging ---
log_destination = 'stderr'        # docker captura stderr → journalctl docker
logging_collector = off
log_line_prefix = '%m [%p] %u@%d '
log_statement = 'mod'             # log INSERT/UPDATE/DELETE/DDL
log_min_duration_statement = 1000 # log queries que tardan >1s
log_connections = on
log_disconnections = on
log_checkpoints = on

# --- Statistics ---
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# --- Locale ---
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'C.UTF-8'
lc_monetary = 'C.UTF-8'
lc_numeric = 'C.UTF-8'
lc_time = 'C.UTF-8'
default_text_search_config = 'pg_catalog.spanish'
