# REQ-74: nginx config para el SPA Angular.
# SPA fallback: cualquier path no-archivo cae en index.html (router cliente).
# Sin proxy /api porque Caddy delante ya hace ruteo a domain-backend.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Aggressive cache para assets (immutable hash en filename).
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # env.js: NO cachear (cambia por VPS/.env).
  location = /assets/env.js {
    add_header Cache-Control "no-store, must-revalidate";
    try_files $uri =404;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
