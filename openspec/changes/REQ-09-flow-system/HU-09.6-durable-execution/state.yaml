notes: |
  internal/runner/flow/recovery.go: worker que detecta flow_runs stale.

  Lógica:
  - Loop cada PollInterval (default 60s)
  - Para runs en status='running' con last_heartbeat_at < NOW - StaleAfter
    (default 5min) → marca como 'failed' con recovery_reason
  - Incrementa flow_runs.recovery_count para tracking

  Política simple (fail) en lugar de resume:
  - Reanudar desde cursor requiere step-level idempotency garantizado para
    TODOS los step types (incluso http_request, agent_run con side-effects)
  - Por ahora marca failed → cliente decide re-trigger manualmente
  - Versión avanzada con resume requiere HU-09.6.1 (step idempotency keys)

  Wire cmd/domain server:
  - Recovery worker corre dentro de leader.RunAsLeader (HU-26.2)
  - Solo el pod leader hace cleanup; el resto sirve tráfico

  Pending:
  - HU-09.6.1 resume parcial desde cursor para steps idempotentes
  - HU-09.10 heartbeat por step (no solo per-run)
  - Métricas Prometheus: domain_flow_recovery_total
  - Notification al admin cuando recovery_count > N en una org
