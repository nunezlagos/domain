name: release-installer

# REQ-54: build cross-platform del binario domain-install y publica como
# GitHub Release. Se dispara con push de tag v*.
#
# El bootstrap.sh/ps1 puede entonces (futuro) bajar el binario directo en
# vez de instalar Go + compilar. Por ahora bootstrap mantiene el path de
# "instalar Go local + compile" como fallback robusto.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # build manual desde la UI

permissions:
  contents: write  # necesario para subir release assets

defaults:
  run:
    working-directory: install-user

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          # Sin go.sum porque el módulo install-user es stdlib-only
          cache: false

      - name: Build domain-install (${{ matrix.os }}/${{ matrix.arch }})
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          out="dist/domain-install-${{ matrix.os }}-${{ matrix.arch }}${ext}"
          go build -ldflags "-s -w" -o "$out" .
          ls -lh "$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: domain-install-${{ matrix.os }}-${{ matrix.arch }}
          path: install-user/dist/*
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into single dir
        run: |
          mkdir -p release
          find artifacts -type f -name 'domain-install-*' -exec cp {} release/ \;
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum domain-install-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/domain-install-*
            release/SHA256SUMS.txt
