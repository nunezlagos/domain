  internal/service/flow.Service CRUD sobre tabla flows (migration 000013).

  Spec JSONB:
  - Version: int (>0)
  - Steps: array de Step{ID, Type, Config, OnError, Retries, TimeoutS}

  Spec.Validate() verifica:
  - version > 0
  - al menos 1 step
  - step.id no vacío y único en el flow
  - step.type en whitelist
  - step.on_error referencia step válido o "fail"/"continue"

  HTTP: POST/GET/DELETE /api/v1/flows + POST /api/v1/flows/{id}/run.

