notes: |
  internal/runner/flow/dryrun.go con DryRun(ctx, flowID, inputs) → DryRunResult.

  Análisis estático por step type:
  - agent_run: estima tokens (chars/4) + cost USD (rate constante $5e-6/token).
    Si agent lookup falla → will_execute=no
  - skill_run: warning side-effects (DB/external)
  - mem_save: warning persistencia + embedding
  - condition: si left/right NO referencian {{outputs.X}} → will_execute=yes,
    sino → depends_on_runtime
  - sub_flow: warning "nested flow not analyzed (re-run dry-run on child)"
  - parallel: cuenta branches
  - http_request: warning side-effects
  - wait_signal: reason "no cost while paused"

  Output DryRunResult{flow_id, flow_slug, plan[], total_estimated_cost_usd,
  total_tokens_in, total_tokens_out}.

  PlanStep{step_id, type, will_execute (yes|no|depends_on_runtime), reason,
  estimated_tokens_in, estimated_tokens_out, estimated_cost_usd, warnings}.

  HTTP: POST /api/v1/flows/{id}/dry-run con body {inputs:{...}}.
  Cross-org guard pre-flight + auth Bearer.

