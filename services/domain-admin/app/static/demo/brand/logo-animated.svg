<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#2b2b2b" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Domain Admin">
  <mask id="holesGlobe" maskUnits="userSpaceOnUse" x="0" y="0" width="48" height="48">
    <rect x="0" y="0" width="48" height="48" fill="white"/>
    <circle cx="6" cy="24" r="4" fill="black"/>
    <circle cx="42" cy="24" r="4" fill="black"/>
    <circle cx="24" cy="6" r="4" fill="black"/>
    <circle cx="24" cy="42" r="4" fill="black"/>
    <circle cx="24" cy="24" r="5" fill="black"/>
  </mask>
  <!-- base estatica -->
  <g mask="url(#holesGlobe)">
    <polygon points="24,6 42,24 24,42 6,24"/>
    <line x1="6" y1="24" x2="42" y2="24" />
    <line x1="24" y1="6" x2="24" y2="42" />
    <circle cx="24" cy="24" r="18"/>
  </g>
  <!-- pulsos de informacion entre nodos -->
  <g fill="#447e9b" stroke="none">
    <circle r="1.3">
      <animateMotion dur="5s" repeatCount="indefinite" path="M24,6 L42,24 L24,42 L6,24 Z"/>
    </circle>
    <circle r="1.3">
      <animateMotion dur="5s" begin="2.5s" repeatCount="indefinite" path="M24,6 L42,24 L24,42 L6,24 Z"/>
    </circle>
    <circle r="1.3" opacity="0">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M6,24 L42,24"/>
      <animate attributeName="opacity" dur="2.2s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    </circle>
    <circle r="1.3" opacity="0">
      <animateMotion dur="2.2s" begin="1.1s" repeatCount="indefinite" path="M24,6 L24,42"/>
      <animate attributeName="opacity" dur="2.2s" begin="1.1s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    </circle>
  </g>
</svg>
