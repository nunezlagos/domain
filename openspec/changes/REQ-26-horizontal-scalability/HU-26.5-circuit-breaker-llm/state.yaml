notes: |
  internal/llm/circuitbreaker.Breaker wraps llm.Provider.

  3 estados: Closed | Open | HalfOpen
  - Closed: requests pasan, contador failures incrementa
  - Open: requests rechazadas (ErrCircuitOpen). Espera RecoveryTimeout
    (default 30s) → HalfOpen
  - HalfOpen: 1 request probe; OK → Closed; Fail → Open

  Config:
  - FailureThreshold: 5 consecutivos por default
  - RecoveryTimeout: 30s default

  IMPORTANTE: success en cualquier momento resetea counter (no abre con
  failures intermitentes intercalados con éxitos).

  Tests unit (5 escenarios + 1 sabotaje):
  - StaysClosedOnSuccess
  - OpensAfterThreshold + no invoca provider mientras Open
  - RecoversThroughHalfOpen tras RecoveryTimeout
  - HalfOpenFailureReopens
  - sabotaje: intermitencias NO abren breaker (necesita N consecutivos)

  Wireado en cmd/domain runServer:
  - Cada provider registrado (anthropic, openai, ollama) se envuelve
    con circuitbreaker.New(provider, {FailureThreshold:5, RecoveryTimeout:30s})
    antes de Register en llmFactory.
  - El runner ve el wrapper como Provider transparente.

  Pending:
  - Métricas Prometheus: domain_llm_breaker_state{provider} gauge (0=closed,1=open,2=half-open)
  - Counter domain_llm_breaker_trips_total{provider} cuando pasa a Open
  - Alert cuando Open dura > 5min
  - Configurar threshold/timeout via env DOMAIN_LLM_CB_* en lugar de hardcoded
