apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "domain.fullname" . }}
  labels:
    {{- include "domain.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "domain.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "domain.selectorLabels" . | nindent 8 }}
      annotations:
        # Force restart cuando ConfigMap cambia
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "domain.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: domain
          image: {{ include "domain.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["server"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "domain.fullname" . }}-config
          env:
            - name: DOMAIN_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.database.name }}
                  key: {{ .Values.existingSecrets.database.keyURL }}
            - name: DOMAIN_DATABASE_AUTH_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.database.name }}
                  key: {{ .Values.existingSecrets.database.keyAuthURL }}
            {{- if .Values.existingSecrets.llm }}
            - name: DOMAIN_ANTHROPIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.llm.name }}
                  key: {{ .Values.existingSecrets.llm.keyAnthropic }}
                  optional: true
            - name: DOMAIN_OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.llm.name }}
                  key: {{ .Values.existingSecrets.llm.keyOpenAI }}
                  optional: true
            {{- end }}
            {{- if .Values.existingSecrets.smtp }}
            - name: DOMAIN_SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.smtp.name }}
                  key: {{ .Values.existingSecrets.smtp.keyUser }}
                  optional: true
            - name: DOMAIN_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.smtp.name }}
                  key: {{ .Values.existingSecrets.smtp.keyPassword }}
                  optional: true
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
