notes: |
  Cost analytics queries via internal/service/cost/service.go.

  Endpoint:
  - GET /api/v1/cost/daily?group_by=org → cost diario consolidado de la org
  - GET /api/v1/cost/daily?group_by=agent → breakdown por agente

  Schema:
  - domain_cost_daily_by_org: organization_id, day, runs, tokens_input,
    tokens_output, cost_usd, avg_duration_s
  - domain_cost_daily_by_agent: + agent_id + agent_slug

