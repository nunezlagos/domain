# Placeholder Secret. En prod usar External Secrets Operator (ESO) sincronizando
# desde AWS Secrets Manager / GCP Secret Manager / Vault.
apiVersion: v1
kind: Secret
metadata:
  name: domain-db
  namespace: domain
type: Opaque
stringData:
  # postgres://app_user:PASS@postgres:5432/domain?sslmode=verify-full
  DOMAIN_DATABASE_URL: "REPLACE_ME_PRIMARY_DSN"
  # postgres://app_admin:PASS@postgres:5432/domain?sslmode=verify-full
  DOMAIN_DATABASE_AUTH_URL: "REPLACE_ME_ADMIN_DSN"
  # postgres://app_user:PASS@postgres-replica:5432/domain?sslmode=verify-full
  DOMAIN_DATABASE_READONLY_URL: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: domain-app
  namespace: domain
type: Opaque
stringData:
  # base64 de la master key AES-256 (32 bytes raw).
  # Generar con: openssl rand 32 | base64
  DOMAIN_MASTER_KEY: "REPLACE_ME_BASE64_32_BYTES"
  # SMTP credentials para OTP + outbound notifications
  DOMAIN_SMTP_HOST: ""
  DOMAIN_SMTP_USER: ""
  DOMAIN_SMTP_PASSWORD: ""
  DOMAIN_SMTP_FROM: "no-reply@example.com"
