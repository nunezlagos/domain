  ## Implementado (2026-06-08)

  ### Auto-set GOMEMLIMIT 80%
  - readCgroupMemoryLimit() helper propio (sin dep externa):
    - cgroup v2: /sys/fs/cgroup/memory.max (respeta "max" = sin límite)
    - cgroup v1: /sys/fs/cgroup/memory/memory.limit_in_bytes
  - TuneRuntime() setea GOMEMLIMIT env var a 80% del cgroup limit si no
    está configurado explícitamente
  - Safe en local sin cgroup → warn log + no setea nada

  ## Pending (aún no implementado)
