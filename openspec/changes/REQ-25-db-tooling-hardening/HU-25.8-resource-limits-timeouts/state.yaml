notes: |
  Migration 000029_role_resource_limits aplica timeouts y connection caps
  per role via ALTER ROLE ... SET y ALTER ROLE ... CONNECTION LIMIT.

  Política aplicada:
  - app_user: statement_timeout=30s, lock_timeout=10s,
    idle_in_transaction_session_timeout=60s, CONNECTION LIMIT 200
  - app_readonly: statement_timeout=120s, lock_timeout=10s,
    idle_in_tx=60s, CONNECTION LIMIT 50
  - app_admin: statement_timeout=0 (batch ok), lock_timeout=30s,
    idle_in_tx=300s, CONNECTION LIMIT 10
  - app_migrator: statement_timeout=0, lock_timeout=60s, idle_in_tx=0,
    CONNECTION LIMIT 5

  Tests integration (6 escenarios + 1 sabotaje):
  - app_user hereda statement_timeout=30s/lock_timeout=10s/idle=1min al LOGIN
  - sabotaje: query con statement_timeout='200ms' aborta pg_sleep(2) con
    "canceling statement due to statement timeout"
  - rolconnlimit verifica caps en pg_roles para app_user (200) y app_admin (10)
  - app_migrator tiene statement_timeout=0 explícito

  IMPORTANTE: ALTER ROLE SET aplica role-level GUC solo al LOGIN, no en
  SET ROLE. Por eso los tests conectan directamente como app_user (LOGIN +
  password). En producción la app debe conectar con user=app_user en DSN.

  Pending: postgresql.conf calibration (work_mem, shared_buffers, etc.) y
  pg_hba.conf con hostssl + scram-sha-256 + hostnossl reject — fuera de
  scope SQL, va en docker compose / k8s helm chart con configmaps. TLS
  verify-full pinning de CA en cliente Go con DOMAIN_PGSSL_ROOT_CERT.
