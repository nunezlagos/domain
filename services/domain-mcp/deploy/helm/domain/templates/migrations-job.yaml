{{- if .Values.migrations.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "domain.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "domain.labels" . | nindent 4 }}
  annotations:
    # Pre-upgrade hook aplica migrations antes del rollout
    "helm.sh/hook": {{ .Values.migrations.hookPolicy | quote }}
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "domain.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "domain.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate", "up"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: DOMAIN_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.database.name }}
                  key: {{ .Values.existingSecrets.database.keyURL }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
{{- end }}
