<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Domain Admin 3D orbital">
  <defs>
    <radialGradient id="isoSphere" cx="0.36" cy="0.30" r="0.8">
      <stop offset="0" stop-color="#cfe6f1"/>
      <stop offset="0.4" stop-color="#79aec8"/>
      <stop offset="1" stop-color="#2e5a72"/>
    </radialGradient>
    <radialGradient id="isoCore" cx="0.36" cy="0.30" r="0.85">
      <stop offset="0" stop-color="#eaf5fa"/>
      <stop offset="0.4" stop-color="#86b9d0"/>
      <stop offset="1" stop-color="#306080"/>
    </radialGradient>
    <linearGradient id="arcFront" x1="6" y1="24" x2="42" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#447e9b"/>
      <stop offset="0.5" stop-color="#9cc6da"/>
      <stop offset="1" stop-color="#447e9b"/>
    </linearGradient>
    <filter id="isoDrop" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.2" flood-color="#16323f" flood-opacity="0.38"/>
    </filter>
  </defs>
  <!-- sombra de contacto en la base -->
  <ellipse cx="24" cy="40" rx="13" ry="2.6" fill="#16323f" opacity="0.18"/>
  <g filter="url(#isoDrop)">
    <!-- arco trasero del aro (detras de todo) -->
    <path d="M 6 24 A 18 8 0 0 1 42 24" fill="none" stroke="#3a6c86" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
    <!-- nodo trasero (mas lejos, mas pequeno) -->
    <circle cx="24" cy="16" r="3.6" fill="url(#isoSphere)"/>
    <ellipse cx="22.9" cy="14.9" rx="1" ry="0.8" fill="#fff" opacity="0.5"/>
    <!-- conexiones radiales sutiles -->
    <line x1="24" y1="24" x2="24" y2="16" stroke="#5e93ad" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="24" y1="24" x2="6" y2="24" stroke="#5e93ad" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="24" y1="24" x2="42" y2="24" stroke="#5e93ad" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
    <line x1="24" y1="24" x2="24" y2="32" stroke="#7fb0c8" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
    <!-- nodos laterales -->
    <circle cx="6" cy="24" r="4.2" fill="url(#isoSphere)"/>
    <ellipse cx="4.9" cy="22.9" rx="1.2" ry="0.9" fill="#fff" opacity="0.5"/>
    <circle cx="42" cy="24" r="4.2" fill="url(#isoSphere)"/>
    <ellipse cx="40.9" cy="22.9" rx="1.2" ry="0.9" fill="#fff" opacity="0.5"/>
    <!-- nodo central -->
    <circle cx="24" cy="24" r="5" fill="url(#isoCore)"/>
    <ellipse cx="22.7" cy="22.7" rx="1.5" ry="1.1" fill="#fff" opacity="0.6"/>
    <!-- arco delantero del aro (delante del centro) -->
    <path d="M 6 24 A 18 8 0 0 0 42 24" fill="none" stroke="url(#arcFront)" stroke-width="2.2" stroke-linecap="round"/>
    <!-- nodo frontal (mas cerca, mas grande) -->
    <circle cx="24" cy="32" r="4.8" fill="url(#isoSphere)"/>
    <ellipse cx="22.7" cy="30.7" rx="1.4" ry="1.05" fill="#fff" opacity="0.55"/>
  </g>
</svg>
