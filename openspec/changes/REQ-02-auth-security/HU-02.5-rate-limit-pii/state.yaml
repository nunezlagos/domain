notes: |
  internal/auth/ratelimit: token bucket per key con refill rate configurable,
  Allow/AllowN/Tokens/RetryAfter/Cleanup/Size. Thread-safe (mu.Lock). Clock
  inyectable para tests determinísticos. Bucket map en memoria; cross-pod
  futuro vía Postgres-backed (HU-26 horizontal-scalability).
  internal/security/pii: regex-based redactor para email/rut/api_key/bearer/
  phone Chile/credit-card. Redact/ContainsPII/RedactMap/RedactHeader con
  whitelist headers sensibles (Authorization, Cookie, X-Api-Key, etc.).
  Regex RUT strict: requiere guión obligatorio para evitar matchear UUIDs.
  Tests: 11 unit ratelimit + 2 sabotaje (NoFreeTokens, ConcurrencySafety),
  14 unit pii + 2 sabotaje (EmailWithPlusTag detecta, NoFalsePositives UUIDs/timestamps).
  Middleware HTTP: RateLimitMiddleware + DefaultKeyFunc (org|ip) ya en cadena
  de main.go. Configurable vía DOMAIN_RATE_LIMIT_* env vars.
  Per-route tuning (cerrado): OTP rate limiter separado (5 reqs/min por
  identifier+IP) en requestOTP y verifyOTP, wireado como OTPRateLimiter
  en handler.API. Cross-pod persistence delegada a HU-26.
