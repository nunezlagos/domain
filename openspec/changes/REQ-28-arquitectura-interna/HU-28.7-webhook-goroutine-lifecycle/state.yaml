notes: |
  IMPLEMENTADO 2026-06-18 (commit 54d6366):

  - NUEVO internal/api/handler/webhook_dispatcher.go: WebhookDispatcher
    con bounded channel + WaitGroup + per-job timeout + panic recovery.
  - internal/api/handler/webhook.go: receiveWebhook usa el dispatcher.
  - internal/api/handler/api.go: API.WebhookDispatcher field.
  - NUEVO internal/api/handler/webhook_dispatcher_test.go: 6 tests.

  Comportamiento esperado en producción:
  - Bajo flood, webhooks devuelven 503 (backpressure). Cliente debe
    reintentar con backoff.
  - Graceful shutdown espera hasta 30s por webhooks en vuelo.

  Breaking change operacional: clientes que asumían "202 Accepted =
  ejecutar siempre" ahora pueden recibir 503. Documentar en CHANGELOG.