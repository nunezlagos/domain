notes: |
  Cambio mínimo (1 línea efectiva en el fix + 1 campo nuevo en StreamChunk).
  Puede cambiar comportamiento de prod: breakers pueden abrirse antes
  porque ahora detectan errores mid-stream.

  IMPLEMENTADO 2026-06-18 (commit e71422d):
  - internal/llm/circuitbreaker/breaker.go: el método CompleteStream ahora
    llama recordFailure() cuando un chunk trae Error (mid-stream failure).
    Antes descartaba sawError con `_ = sawError`.
  - internal/llm/provider.go: nuevo campo Error string en StreamChunk
    (json:"error,omitempty") para que el provider comunique mid-stream
    failures explícitamente.
  - internal/llm/circuitbreaker/breaker_stream_test.go: 3 tests nuevos
    (TestBreaker_StreamErrorRecordsFailure,
    TestBreaker_StreamSuccessRecordsSuccess,
    TestSabotage_StreamError_DeliberatelyOpensBreaker).

  Riesgo operacional: breakers pueden abrirse antes del fix. Monitorear
  después del deploy. Compatible con el cambio: el breaker ahora refleja
  el estado REAL del provider (incluyendo errores parciales).