  deploy/backups/pgbackrest.conf:
  - Repo S3 encriptado (AES-256-CBC) con env vars (DOMAIN_BACKUP_*)
  - Política: full weekly + diff daily + incremental hourly
  - Retention: 4 fulls, 7 diffs, 24 incrementals
  - Compresión zstd level 3
  - process-max=4 parallel

  deploy/backups/cron-backups.cron:
  - Domingo 02:00 UTC: full
  - Lun-Sáb 02:00 UTC: diff
  - Cada hora excepto 02:00: incremental
  - Lunes 03:00 UTC: pgbackrest check (verifica WAL chain)
  - Cada 5min: heartbeat al endpoint domain-backup-heartbeat

  docs/runbooks/restore.md: procedimiento step-by-step de DR
  - Pre-requisitos (S3 creds, cipher pass, nuevo host)
  - Pasos: scale down → provisión PG → config pgbackrest → restore →
    sanity SQL → re-encriptar secrets si rotó → restart Domain → verificar
  - Drill mensual con make drill-restore
  - Anti-patterns + métricas post-restore

