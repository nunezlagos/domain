; PgBouncer config para Domain — HU-25.1
;
; Transaction-pool mode: multiplexa conexiones a Postgres por transaction.
; Permite que muchos clientes Domain compartan pocas conexiones reales DB.
;
; Compat con Domain: usa SET LOCAL (tx-scoped) para app.current_org_id
; (HU-25.5 RLS) — válido en transaction pool mode. NO usar prepared statements
; ni SET (sin LOCAL) ni LISTEN/NOTIFY desde la app.

[databases]
domain = host=postgres-primary port=5432 dbname=domain auth_user=pgbouncer
domain_replica = host=postgres-replica port=5432 dbname=domain auth_user=pgbouncer

[pgbouncer]
; Listener
listen_addr = 0.0.0.0
listen_port = 6432

; Auth — usa pg_auth_user con SCRAM-SHA-256
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_user = pgbouncer

; Pool mode
pool_mode = transaction

; Sizing
default_pool_size = 25          ; conns por (db,user) al backend
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 5
max_client_conn = 1000          ; clientes Domain pueden abrir hasta 1000 a PgBouncer
max_db_connections = 50         ; total conns a Postgres backend
max_user_connections = 50

; Timeouts (segundos)
server_idle_timeout = 600       ; cerrar conn idle a backend
server_lifetime = 3600          ; recyclar conns cada 1h
client_idle_timeout = 0         ; clientes pueden idle sin límite
query_timeout = 60              ; query DB > 60s → kill
query_wait_timeout = 30         ; espera en queue del pool max 30s
client_login_timeout = 30

; TLS hacia clientes (Domain pods)
client_tls_sslmode = prefer
; Server TLS hacia Postgres
server_tls_sslmode = verify-full
server_tls_ca_file = /etc/pgbouncer/ca.crt

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
verbose = 0

; Stats (Prometheus exporter scrape)
stats_period = 60
ignore_startup_parameters = extra_float_digits,search_path

; Admin
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats
