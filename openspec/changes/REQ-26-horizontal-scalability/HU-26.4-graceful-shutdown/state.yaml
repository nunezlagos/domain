notes: |
  cmd/domain runServer ahora traps SIGINT/SIGTERM y llama srv.Shutdown con
  timeout 30s. Permite drain de in-flight requests antes del kill.

  Flow:
  1. K8s envía SIGTERM al pod
  2. Goroutine de shutdown detecta señal, log "draining..."
  3. srv.Shutdown(ctx 30s):
     - net/http deja de aceptar nuevas conexiones
     - in-flight requests siguen hasta completar o timeout
  4. ListenAndServe retorna ErrServerClosed → exit clean
  5. Si timeout 30s vence → forced shutdown logged

  K8s terminationGracePeriodSeconds default 30s coincide con nuestro timeout.

  Pending HU-26.* completo:
