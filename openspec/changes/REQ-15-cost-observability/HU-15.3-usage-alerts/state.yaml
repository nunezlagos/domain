notes: |
  migration 000040 con tablas usage_alerts + usage_alert_fires.

  internal/service/usagealerts/ package:
  - Métricas soportadas: cost_per_run, cost_per_day, cost_per_month,
    tokens_per_run, tokens_per_day
  - Conditions: greater_than, less_than, equals
  - Channels: webhook, email, log_only
  - Cooldown configurable (default 3600s) previene spam
  - CRUD: Create/ListByOrg/Get/Delete/SetActive
  - EvaluateRunEvent(ctx, orgID, costUSD, tokensTotal) → []Alert disparadas
    + insert en usage_alert_fires + actualiza last_fired_at + fire_count
  - inCooldown(a) skip si LastFiredAt + Cooldown > NOW

  Integración con outbound webhooks (HU-10.4):
  - RunnerEmitter.UsageAlerts = service.AsUsageAlerter()
  - Tras cada agent_run completed, evalúa alerts + emite evento "usage.alert_fired"
    con payload {alert_id, name, metric, threshold, observed, channel, run_id}
  - Subscriptions outbound pueden suscribirse a "usage.alert_fired"
  - usage.alert_fired agregado al catálogo AllowedEvents

  HTTP:
  - POST /api/v1/usage-alerts (create)
  - GET /api/v1/usage-alerts (list)
  - DELETE /api/v1/usage-alerts/{id}

  Tests service_test.go (3):
  - CompareThreshold con 8 cases (GT/LT/EQ + edge)
  - validMetrics catalog
  - validConditions catalog

  Aggregate evaluator (cron-driven):
  - EvaluateAggregates(ctx) evalua cost_per_day, cost_per_month, tokens_per_day
    para TODAS las orgs con alertas activas. Consulta agent_runs aggregated via
    SUM + COALESCE. Leader worker runUsageAlertEvaluator cada 5min (main.go).
  - Permite que métricas agregadas disparen alerts igual que las per-run.

  HTTP endpoints (completos):
  - PATCH /api/v1/usage-alerts/{id} → updateUsageAlert: actualiza campos
    individuales (name, metric, threshold, condition, channel, recipients,
    cooldown_secs) mediante UpdateInput con punteros (solo campos no-nil)
  - GET /api/v1/usage-alerts/{id}/fires → listUsageAlertFires: historial
    de disparos ordenado DESC con limit (default 50, max 200)
  - Ambos con cross-org guard via JOIN usage_alerts.organization_id

  Aggregate evaluator (cron-driven):
  - EvaluateAggregates(ctx) evalua cost_per_day, cost_per_month, tokens_per_day
    para TODAS las orgs con alertas activas. Consulta agent_runs aggregated via
    SUM + COALESCE. Leader worker runUsageAlertEvaluator cada 5min (main.go).
  - Permite que métricas agregadas disparen alerts igual que las per-run.

