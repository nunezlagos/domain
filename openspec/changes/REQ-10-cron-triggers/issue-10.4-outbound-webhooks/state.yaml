notes: |
  Schema: migration 000038_create_outbound_webhooks
  - outbound_webhook_subscriptions (URL + events[] + filters JSONB +
    secret cifrado at-rest con crypto.Cipher AES-256-GCM)
  - outbound_webhook_deliveries (1 row per attempt, audit completo:
    response_code + body + duration + error_message + next_retry_at)

  internal/service/outboundwebhook:
  - Service: Create/Get/ListAll/ListByEvent/Delete + SSRF validation
    (bloquea localhost, 127.*, 10.*, 172.16-31.*, 192.168.*, 169.254.*, .local,
    .internal). Esquema https obligatorio si DOMAIN_OUTBOUND_REQUIRE_TLS=true.
  - Dispatcher: Emit (encola deliveries para subs matcheadas + filter eval) +
    ProcessPending (FOR UPDATE SKIP LOCKED para multi-worker safe).
  - HMAC: secret + timestamp + body → X-Domain-Signature: sha256=hex
  - Retry exponencial 10s/1m/5m/30m/2h/6h/12h/24h → dead_letter al 9° intento.
  - RunnerEmitter: bridge agent_runner.EventEmitter + flow_runner.EventEmitter.
    Eventos: agent_run.completed, agent_run.failed, flow_run.completed, flow_run.failed.

  HTTP:
  - POST /api/v1/outbound-webhooks (create)
  - GET /api/v1/outbound-webhooks (list)
  - GET /api/v1/outbound-webhooks/{id} (get)
  - DELETE /api/v1/outbound-webhooks/{id} (delete)
  - POST /api/v1/outbound-webhooks/{id}/test (emite webhook.test_ping)

  Worker: dispatcher loop cada 5s en leader (junto a cron scheduler + flow recovery).
  Cipher master key se carga de DOMAIN_MASTER_KEY (base64); secrets sin cipher = sin firma.

  Tests:
  - service_test.go cubre ValidateURL con todos los casos SSRF + scheme + private CIDRs.

  Eventos catálogo abierto (AllowedEvents map):
  - agent_run.completed/.failed
  - flow_run.completed/.failed
  - observation.created (no emitido aún — pending hook en obs.Save)
  - invitation.accepted (no emitido aún)
  - webhook.test_ping

  Pending:
  - issue-10.4 escenario 4: replay manual de delivery DLQ con nuevo timestamp
  - issue-10.4 escenario 5 avanzado: filtros con operadores ({gt:, lt:, in:})
  - Auto-pause subscription cuando failure_count > umbral (circuit breaker)
  - Notification al admin cuando una sub entra en DLQ recurrente
  - Tests integration con httptest server (mock receiver + verify HMAC)
  - Hooks para observation.created + invitation.accepted (emit donde corresponde)
