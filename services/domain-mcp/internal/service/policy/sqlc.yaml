version: "2"
sql:
  - engine: "postgresql"
    schema: "../../migrate/migrations"
    queries: "sql"
    gen:
      go:
        package: "policydb"
        out: "policydb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        omit_unused_structs: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
