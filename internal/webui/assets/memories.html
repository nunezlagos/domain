<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Domain — Admin Memories</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/admin/style.css">
</head>
<body>
<header>
  <h1>Domain · Admin · Memories</h1>
  <nav>
    <a href="/admin/">Dashboard</a> ·
    <a href="/admin/skills">Skills</a> ·
    <a href="/admin/memories">Memories</a>
  </nav>
</header>

<main>
  <section>
    <input type="search" id="q" placeholder="Filtrar por contenido…">
    <select id="kind">
      <option value="observations">Observations</option>
      <option value="knowledge">Knowledge docs</option>
    </select>
    <span class="muted" id="count"></span>
  </section>

  <table>
    <thead>
      <tr><th>ID</th><th>Title / Type</th><th>Preview</th><th>Created</th><th>Actions</th></tr>
    </thead>
    <tbody id="memories-body"></tbody>
  </table>
</main>

<script>
async function refresh() {
  const q = document.getElementById('q').value;
  const kind = document.getElementById('kind').value;
  const r = await fetch(`/admin/api/memories/${kind}?q=` + encodeURIComponent(q));
  const items = await r.json();
  document.getElementById('count').textContent = items.length + ' items';
  const body = document.getElementById('memories-body');
  body.innerHTML = '';
  for (const it of items) {
    const titleOrType = kind === 'knowledge' ? it.title : it.observation_type;
    const preview = kind === 'knowledge' ? it.body_preview : it.content_preview;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><code>${it.id.slice(0,8)}…</code></td>
      <td>${titleOrType}</td>
      <td class="muted">${(preview || '').slice(0, 80)}…</td>
      <td>${new Date(it.created_at).toLocaleString('es-CL')}</td>
      <td>
        <button onclick="del('${kind}','${it.id}')">Soft delete</button>
      </td>`;
    body.appendChild(tr);
  }
}
async function del(kind, id) {
  if (!confirm('Soft-delete este item?')) return;
  const r = await fetch(`/admin/api/memories/${kind}/${id}/delete`, { method: 'POST' });
  if (!r.ok) alert('error: ' + r.status);
  refresh();
}
document.getElementById('q').addEventListener('input', refresh);
document.getElementById('kind').addEventListener('change', refresh);
refresh();
</script>
</body>
</html>
