# Whitelist HU-26.1 stateless-invariant
# Cada entrada documenta por qué un global in-memory es aceptable.
# Format: path relative al root + var name + reason no-trivial.
allowed:
  # DOMAINSERV-88: se removieron 2 entradas muertas (bucket.go, cache.go) que
  # apuntaban a archivos inexistentes. Agregar acá solo globals reales que el
  # linter marque, con {path, var, reason}.
  - path: internal/api/cursor/cursor.go
    var: hmacKey
    reason: |
      HMAC key del cursor pagination cargada al boot desde env.
      Inmutable post-init; lectura concurrente safe.
