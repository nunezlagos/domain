name: Benchmarks mcp

on:
  push:
    branches: [services]
    paths:
      - 'services/domain-mcp/**'
      - '.github/workflows/benchmarks-mcp.yml'
  pull_request:
    paths:
      - 'services/domain-mcp/**'
      - '.github/workflows/benchmarks-mcp.yml'

defaults:
  run:
    working-directory: services/domain-mcp

jobs:
  bench:
    name: Go benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: services/domain-mcp/go.sum
      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=3 ./... 2>&1 | tee /tmp/bench.txt
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: /tmp/bench.txt
      - name: Check SLO targets
        run: |
          echo "=== Benchmarks completed ==="
          echo "Results uploaded as artifact: benchmark-results-${{ github.sha }}"
