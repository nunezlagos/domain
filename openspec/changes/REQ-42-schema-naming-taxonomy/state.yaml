status: active
created: 2026-06-18
phase: F4
origin: >
  El schema de domain-backend creció sin convención de naming consistente:
  tablas con prefijo de dominio conviven con tablas sueltas (requirements,
  proposals, designs, tasks, gherkin_scenarios, verifications, observations,
  clients), prefijos legacy multi-tenant (org_enrollment_tokens,
  org_cost_alert_thresholds) y tablas redundantes single-org (billing/costos,
  infra de mensajería). REQ-42 fija la taxonomía "toda tabla lleva prefijo de
  su funcionalidad", la materializa en table_catalog, dropea lo redundante,
  renombra por dominio (RENAME directo atómico, NO expand/contract), agrupa el
  explorador /database del admin y activa el lint de prefijo a futuro.
notes: >
  Base casi vacía (solo auth_events, auth_sessions, schema_migrations tienen
  filas) → renames/drops con riesgo NULO sobre datos. Precedente atómico:
  migración 000146 (org_flow_config → flow_config). Asignación de migraciones:
  42.1→000147, 42.2→000148, 42.3→000149, 42.4→000150, 42.5→000151,
  42.6→000152, 42.7→000153, 42.8→000154, 42.9→000155. Las HU 42.10 (Angular) y
  42.11 (lint) NO crean migración. Cada rename va en el MISMO deploy que su
  código Go (aplicar la migración con el binario viejo rompe el pipeline con
  "relation ... does not exist").
