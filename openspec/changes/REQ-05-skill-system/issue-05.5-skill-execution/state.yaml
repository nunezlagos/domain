notes: |
  internal/runner/skill.Runner implementa ejecución de los 4 skill types.

  Types soportados:
  - prompt: substitute {{var}} → value. Error si quedan placeholders no
    sustituidos (var not provided).
  - api: parsea content como JSON {url, method, headers, body_template},
    aplica template render PRIMERO (vars en URL/headers OK), valida scheme
    http/https, valida allowlist hosts opcional, HTTP call con timeout 30s,
    response body capped a 1MB. Devuelve JSON {status_code, body, headers}.

  Types stub con error explícito:
  - code: ErrNotImplemented "issue-11.1 pending sandbox runner"
  - mcp_tool: ErrNotImplemented "issue-12.4 pending MCP forward"

  Wiring:
  - internal/runner/agent.Runner ahora delega al SkillRunner inyectado
  - cmd/domain server + cmd/domain-mcp crean skillrunner.New() y lo pasan
    al agentrunner

  Seguridad API skill:
  - Allowlist hosts opcional (Runner.AllowedHosts)
  - Validación scheme http/https (rechaza file://, ftp://, etc.)
  - Allowlist evaluada DESPUÉS de template render (no bypaseable)
  - LimitReader 1MB en response body

  Tests unit (8 escenarios + 2 sabotaje):
  - Prompt rendering + missing var error
  - API happy path con HTTP mock + headers templated
  - API allowlist rechaza host no whitelisted
  - API rechaza schemes file://
  - API content malformado → ErrInvalidConfig
  - Code/MCPTool → ErrNotImplemented con HU pending ref
  - sabotaje: allowlist post-template (no bypassable via {{host}})
  - sabotaje: response > 1MB se cappea

  Pending:
  - issue-11.1 sandbox para code skills
  - issue-12.4 MCP forward para mcp_tool
  - Persistencia skill_runs si se necesita tracking individual
  - Rate limiting por skill
  - Retry con backoff en api skills (issue-09.4)
