apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay staging: 2 réplicas, HPA conservativo.

namespace: domain-staging
namePrefix: staging-

bases:
  - ../../base

commonAnnotations:
  domain.io/environment: staging

replicas:
  - name: domain
    count: 2

patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: domain
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 6

configMapGenerator:
  - name: domain-env-config
    literals:
      - DOMAIN_LOG_LEVEL=info
      - DOMAIN_METRICS_ENABLED=true
      - DOMAIN_OTEL_SAMPLE_RATIO=0.25
