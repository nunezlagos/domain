# REQ-70: stack de monitoring (Prometheus + Grafana) en la red domain_internal.
# Monta como sidecar: `docker compose -f monitoring/docker-compose.yml --env-file ../../.env up -d`
#
# Prometheus scrapea domain-backend:9090/metrics. El backend debe exponer
# 9090 en domain_internal (env DOMAIN_METRICS_BIND=0.0.0.0).
#
# Grafana en :3000 (LAN, sin TLS — IP-only).
#   user: admin / pass: ${GRAFANA_ADMIN_PASSWORD} desde .env

services:

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: domain-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - domain_internal
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: domain-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    networks:
      - domain_internal
    ports:
      - "3000:3000"

volumes:
  prometheus-data:
  grafana-data:

networks:
  domain_internal:
    name: domain_internal
    external: true
