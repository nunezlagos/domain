notes: |
  internal/debug/pprof.go con servidor opcional en puerto separado:
  - DOMAIN_DEBUG_ENABLED=true habilita el server
  - DOMAIN_DEBUG_BIND default 127.0.0.1 (bind interno, no expone públicamente)
  - DOMAIN_DEBUG_PORT default 6060
  - DOMAIN_DEBUG_AUTH_USER + DOMAIN_DEBUG_AUTH_PASSWORD obligatorios para auth
  - Sin auth configurada → warning log + server SIN auth (acepta solo si bind 127.0.0.1)

  Endpoints expuestos (net/http/pprof stdlib):
  - /debug/pprof/ (Index)
  - /debug/pprof/cmdline, /heap, /goroutine, /profile?seconds=30
  - /debug/pprof/allocs, /mutex, /block, /symbol, /trace

  Basic auth con subtle.ConstantTimeCompare → timing-safe.
  401 con WWW-Authenticate: Basic realm="debug" si auth falla.

  Log de acceso: warn cuando 401, info cuando OK (path + user + remote).

  Pending:
  - HU-27.1 escenario 5: audit_log "debug.pprof.accessed" — pegar al audit.Recorder
    cuando se accede. Por ahora solo log slog.
  - Métricas Prometheus: domain_debug_pprof_accessed_total{endpoint,user}
  - Helm chart: añadir Service interno (ClusterIP) en puerto 6060 SOLO si
    DOMAIN_DEBUG_ENABLED=true, con NetworkPolicy restringiendo source.
  - Test unit con httptest validando auth 401/200 + endpoints registrados
