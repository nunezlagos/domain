# REQ-74: deploy del admin dashboard.
# Build local. Reemplaza domain-frontend (coming-soon).

services:
  domain-admin:
    build:
      context: .
      dockerfile: Dockerfile
    image: domain-admin:local
    container_name: domain-admin
    restart: unless-stopped
    environment:
      # Vacío = mismo origen. Caddy proxyea /api → domain-backend.
      API_URL: ""
    networks:
      - domain_internal
    expose:
      - "80"

networks:
  domain_internal:
    name: domain_internal
    external: true
