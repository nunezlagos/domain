notes: |
  Tabla prompts (migration 000008) implementa PROMPT TEMPLATES VERSIONADOS,
  no buffer process-local de prompts de chat. Para "captura de prompts de
  usuario en conversación" — usar observations con observation_type='prompt'.

  internal/service/prompt.Service implementa templates:
  - Create(CreateInput): auto-incrementa version per (org, project, slug),
    si SetActive=true desactiva versiones previas en la misma tx.
    Audit "prompt.created".
  - SetActive(id): tx con FOR UPDATE, marca esta versión activa y desactiva
    siblings del mismo slug+project. Audit "prompt.set_active".
  - GetActive(orgID, projectID, slug): devuelve la versión actualmente
    activa. ErrNoActiveVersion si ninguna.
  - GetByID, ListVersions: lookups por id o por slug.
  - Search(orgID, query, limit): BM25 sobre body_tsv con ts_headline para
    fragmento destacado (<mark>...</mark>).
  - SoftDelete: marca deleted_at + is_active=false.

  Variables JSONB shape: [{"name","type","required","default"}]
  Validación de tipos pending HU futura (skill contract HU-05.6).

  HTTP handlers:
  - POST   /api/v1/prompts
  - GET    /api/v1/prompts/{id}
  - POST   /api/v1/prompts/{id}/activate
  - DELETE /api/v1/prompts/{id}
  - GET    /api/v1/prompts/by-slug/{slug}/versions  ?project_slug=
  - GET    /api/v1/prompts/search                   ?q= &limit=

  MCP tools (prefix domain_*):
  - domain_prompt_get(slug, project_slug?)        — versión activa
  - domain_prompt_search(query, limit?)

  Tests integration (9 escenarios + 1 sabotaje):
  - Create primer version = 1, IsActive
  - Create segundo version auto-increment a 2, desactiva v1
  - Slug inválido + body vacío rechazados
  - GetActive devuelve la actual
  - SetActive promueve versión previa (downgrade rollback)
  - Search con headline <mark> destacando matches
  - SoftDelete oculta de GetActive
  - sabotaje: solo UNA versión activa simultánea por slug+project

  Pending:
