notes: |
  service.StepTypeSubFlow = "sub_flow" agregado al catálogo + whitelist.

  runner.execSubFlow ejecuta otro flow como step:
  - Lookup por flow_slug en la misma org del padre
  - Inputs del step.Config["input"] → child flow inputs
  - Detección circular vía context chain (subflowCtxKey []string):
    cada hijo añade su slug; si ya estaba en la cadena → error
    "circular sub-flow reference detected: a → b → a"
  - Depth max 10 niveles → error si excede
  - Output del step: {flow_run_id, status, outputs}
  - Si child status=failed → step retorna error (parent on_error policy aplica)

  Tests:
  - TestFormatChain (helper de chain printer)
  - TestSubflowCircular_DetectaCadenaRepetida (escenario 6)
  - TestSubflowDepthLimit_Constante (sanity check)

  Pending:
  - Escenario 3: parallel step type aún stub. Para parallel-subflows hay que
    implementar StepTypeParallel completo con goroutines + errgroup
  - GET /api/v1/flows/{slug}/parents (escenario 8) — query reverse
  - Test integration end-to-end con flow padre real + flow hijo real
  - Template variable substitution `{{steps.X.result.Y}}` en input map antes
    de pasarlo al child (actualmente el input se pasa literal; el flow runner
    ya hace template substitution en otros lugares — extender al sub_flow)
  - Métricas Prometheus: domain_subflow_executions_total{parent,child,status}
  - Sabotaje test: ciclo a→b→c→a debe detectarse
