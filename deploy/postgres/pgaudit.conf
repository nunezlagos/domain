# HU-25.7 pgaudit configuration — auditoría a nivel Postgres
#
# Diseñado para incluirse vía conf.d:
#   include_dir = '/etc/postgresql/conf.d'
#
# Requiere pgaudit como shared library:
#   shared_preload_libraries = 'pg_stat_statements,pgaudit'
#
# Después de habilitar, ejecutar como superuser en la DB:
#   CREATE EXTENSION IF NOT EXISTS pgaudit;

# ============================================================================
# Categorías capturadas:
#   ddl        — CREATE/ALTER/DROP de cualquier objeto
#   role       — CREATE ROLE, ALTER ROLE, GRANT, REVOKE, DROP ROLE
#   write      — INSERT/UPDATE/DELETE (todas las tablas)
#   function   — invocaciones de funciones (opcional, alto volumen)
#
# Categorías deshabilitadas por costo:
#   read       — SELECT en todas las tablas. Reemplazado por log_object
#                (SELECT solo en tablas marcadas con security label).
# ============================================================================

pgaudit.log = 'ddl, role, write'

# log_relation=on: incluye relation name en el log line.
pgaudit.log_relation = on

# log_catalog=off: NO logea operaciones sobre pg_catalog (ruido).
pgaudit.log_catalog = off

# log_parameter=on: incluye parameter values en prepared statements.
# DESHABILITADO: puede leakear PII en logs. Para queries críticas usar
# extended audit via log_object con security labels y redacción upstream.
pgaudit.log_parameter = off

# log_statement_once=on: en multi-statement transactions, solo logea la
# primera ocurrencia (reduce volumen).
pgaudit.log_statement_once = on

# log_level=log: usa LOG level (no NOTICE) — más visible en log shippers.
pgaudit.log_level = log

# ============================================================================
# Object-level auditing — para SELECT en tablas sensibles:
#   GRANT SELECT, INSERT, UPDATE, DELETE ON secrets TO audit;
#   ALTER ROLE audit SET pgaudit.log = 'read, write';
#   SECURITY LABEL FOR pgaudit ON TABLE secrets IS 'READ,WRITE';
# Aplicar via migration separada para las tablas: secrets, audit_log,
# subscriptions, custom_roles, plan_assignments.
# ============================================================================
