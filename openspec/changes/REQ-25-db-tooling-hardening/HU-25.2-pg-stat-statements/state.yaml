notes: |
  Migration 000033_pg_stat_statements_history:
  - Tabla domain_query_stats_history para snapshots semanales
  - Indexes por captured_at DESC y queryid + captured_at DESC
  - GRANTs explícitos a app_user/app_admin
  - NO CREATE EXTENSION (requiere shared_preload_libraries en
    postgresql.conf que solo se setea via config + restart, no SQL)

  internal/dbstats.Service:
  - Available(): SELECT EXISTS FROM pg_extension WHERE extname = 'pg_stat_statements'
  - SlowQueries(thresholdMS, limit): top-N queries con mean_exec_time
    >= threshold, ORDER BY mean_exec_time DESC. Devuelve ErrNotAvailable
    si extensión ausente.
  - Snapshot(): INSERT INTO domain_query_stats_history SELECT FROM
    pg_stat_statements WHERE calls > 0
  - Reset(): SELECT pg_stat_statements_reset()
  - HistorySince(since, limit): SELECT del history (independiente de la
    extensión runtime, lee solo la tabla)

  Tests integration (5 escenarios):
  - Available true cuando container arranca con
    `postgres -c shared_preload_libraries=pg_stat_statements`
  - SlowQueries detecta queries con pg_sleep(0.05) sobre threshold 40ms
  - Snapshot inserta filas en history
  - Reset trunca pg_stat_statements
  - Sin shared_preload_libraries: Available=false + ErrNotAvailable
    en SlowQueries (no crashea)

  Linter ajustado: agregada lista pluralEquivalentSuffixes (_log, _history,
  _data, _metadata, _status, _config, _settings, _audit) para no flagear
  nombres colectivos en inglés.

  Pending (infra, no Go):
  - postgresql.conf de docker compose / helm chart con:
    * shared_preload_libraries = 'pg_stat_statements,auto_explain'
    * pg_stat_statements.max = 10000
    * pg_stat_statements.track = all
    * auto_explain.log_min_duration = 100
    * auto_explain.log_analyze = true
  - Cron job que llama svc.SlowQueries() cada 5min y emite métricas
    Prometheus domain_db_slow_queries_total (cuando HU-27.1 jobs framework)
  - Cron weekly que llama Snapshot() + Reset() en ese orden
  - HTTP /admin/db/slow-queries (platform_admin RBAC) pending HU-02.8
