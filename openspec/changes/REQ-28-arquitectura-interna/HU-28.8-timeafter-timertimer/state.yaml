notes: |
  IMPLEMENTADO 2026-06-18 (commit 78e250d) — refactor PARCIAL de los 6
  retry/poll loops más críticos. Quedan 28 usos de time.After en
  contextos one-shot (no loops), que no tienen el leak problemático.

  Archivos refactorizados:
  - internal/llm/retry/retry.go: 2 retry loops (Complete + CompleteStream)
  - internal/service/flow/saga.go: 2 retry loops en RunCompensation
  - internal/service/flow/signals.go: WaitForSignal poll loop
  - internal/runner/flow/resume.go: retry backoff entre steps
  - internal/runner/flow/retry.go: retry delay entre attempts
  - internal/cache/distributed/cache.go: exponential backoff

  Patrón: `time.NewTimer(d)` + `t.Stop()` en branch ctx.Done(). Reusable.

  Tests existentes siguen verdes (la API pública de los servicios
  no cambia, solo el lifecycle interno de los timers).

  Follow-up opcional (no bloqueante): convertir los 28 time.After
  restantes si se quiere ser exhaustivo. Pero el impacto en producción
  es bajo (cada uno se ejecuta una vez, no acumula).