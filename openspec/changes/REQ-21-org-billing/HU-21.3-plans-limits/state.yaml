notes: |
  Migration 000032_create_plans_usage:
  - Tabla plans (id, slug, name, tokens_per_month NULL=ilimitado,
    runs_per_month, storage_gb_max, members_max, seats, soft_limit_ratio,
    monthly_price_usd, is_active)
  - Seeds Free/Pro/Enterprise con límites por defecto del spec
  - organizations.plan_id FK + custom_limits JSONB + plan_started_at
  - usage_counters PK (organization_id, period_start DATE) con UPSERT
    atómico ON CONFLICT DO UPDATE SET col = old + new
  - GRANTs explícitos a app_user/app_admin

  internal/service/billing.Service:
  - GetPlan(slug) — lookup
  - AssignPlan(orgID, slug) — UPDATE org.plan_id + plan_started_at
  - ResolveLimits(orgID) — devuelve Limits combinando plan + custom_limits
    JSONB. Custom override gana (escalar por escalar).
  - IncrementTokens(orgID, n) / IncrementRuns(orgID) — UPSERT atómico al
    period_start = primer día del mes UTC
  - GetUsage(orgID) — período actual
  - CheckTokens(orgID, additional) → LimitState con SoftLimitHit (>= 80%),
    HardLimitHit (>=100%). Devuelve ErrQuotaExceeded si hard.

  Tests integration (9 escenarios + 1 sabotaje):
  - Plans seed (Free 100k, Pro 5M, Enterprise unlimited)
  - AssignPlan funciona
  - IncrementTokens acumula
  - SoftLimit detectado al 80% sin error
  - HardLimit detectado al 100% con ErrQuotaExceeded
  - Enterprise (NULL tokens) = unlimited siempre
  - period_start es siempre primer día del mes UTC
  - custom_limits JSONB override defaults
  - sabotaje concurrencia: 50 goroutines x 100 tokens = 5000 (sin lost updates)

