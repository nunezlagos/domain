# HU-45.1: deploy del admin Django placeholder.
# Build local. Reemplaza el sunset de REQ-41 (Angular CoreUI) en commit 5d03726.
#
# Caddy (services/caddy/Caddyfile) ya rutea /* → domain-admin:80.
# Makefile (services/Makefile) ya tiene SVC=admin que mapea a este compose.

services:
  domain-admin:
    build:
      context: .
      dockerfile: Dockerfile
    image: domain-admin:local
    container_name: domain-admin
    restart: unless-stopped
    environment:
      # HU-45.1 sin DB todavía. HU-45.2 sumará DATABASES + read replica config.
      DJANGO_SETTINGS_MODULE: config.settings
      PYTHONUNBUFFERED: "1"
      # HU-47.1: credenciales master del admin. Defaults para dev/demo.
      # Override via /opt/services/.env en producción.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@admin.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-q1w2e3r4}
      # HU-48.1: conexión a Postgres compartido (mismas vars que domain-mcp).
      POSTGRES_DB: ${POSTGRES_DB:-domain}
      DB_APP_USER: ${POSTGRES_DB_USER:-app_user}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      # Passphrase de cifrado at-rest de API keys (pgcrypto). DEBE ser identica a
      # la de domain-mcp; el admin descifra key_ciphertext para mostrar la key.
      DOMAIN_FIELD_ENC_KEY: ${DOMAIN_FIELD_ENC_KEY}
    networks:
      - domain_internal
    expose:
      - "80"
    healthcheck:
      # gunicorn responde HTTP en /; usamos wget (presente en python:3.12-slim? no,
      # viene busybox-like). Mejor usar python -c para no asumir binarios extra.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost/', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  domain_internal:
    name: domain_internal
    external: true