archive_reason: |
  Decisión user 2026-06-10: "por ahora todo en base de datos, nada en web".
  Domain prioriza flow definition vía:
  - CLI: cmd/domain (HU-14.1) con subcomandos flow create/update/list.
  - MCP: tools domain_flow_* expuestos por internal/mcp/server (HU-12.3).
  - REST API: /api/v1/flows endpoints CRUD (HU-13.1 + REQ-09).
  - YAML/JSON: import/export programático vía endpoints.
  - Versionado: HU-09.7 flow_versions persistido en BD.

  Editor visual drag-and-drop (react-flow / canvas SPA) queda fuera del
  scope inmediato. Si en el futuro un equipo necesita UI visual, esta HU
  puede reactivarse: backend ya tiene todo lo necesario (DAG validator,
  state machine, step types, versioning, dry-run, snapshots) — solo
  faltaría la capa frontend.

  Las otras HUs web-ui (16.1 dashboard, 16.2 run-viz, 16.4 admin-skills,
  16.5 admin-memories) quedan implementadas como server-rendered HTML
  minimal — útiles para ops/debug sin requerir SPA stack.
