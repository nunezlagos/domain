{# Icono SVG inline por fase SDD. `icon` = clave (search/doc/bulb/...).
   stroke="currentColor" → hereda el color del grupo desde el CSS. #}
<svg viewBox="0 0 24 24" width="20" height="20" fill="none"
     stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
     stroke-linejoin="round" aria-hidden="true">
  {% if icon == "search" %}
    <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
  {% elif icon == "doc" %}
    <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>
    <path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h4"/>
  {% elif icon == "bulb" %}
    <path d="M9 18h6"/><path d="M10 22h4"/>
    <path d="M12 2a7 7 0 0 0-4 12.7c.6.6 1 1.4 1 2.3h6c0-.9.4-1.7 1-2.3A7 7 0 0 0 12 2z"/>
  {% elif icon == "blueprint" %}
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <path d="M3 9h18"/><path d="M9 21V9"/><path d="M13 13h4"/><path d="M13 17h4"/>
  {% elif icon == "checklist" %}
    <path d="M11 4h9"/><path d="M11 12h9"/><path d="M11 20h9"/>
    <path d="M3 5l1.5 1.5L7 4"/><path d="M3 13l1.5 1.5L7 11"/>
    <rect x="3" y="18.5" width="3.5" height="3.5" rx=".6"/>
  {% elif icon == "code" %}
    <path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/>
  {% elif icon == "check" %}
    <path d="M20 6L9 17l-5-5"/>
  {% elif icon == "scale" %}
    <path d="M12 3v18"/><path d="M5 21h14"/>
    <path d="M5 7l-3 6h6z"/><path d="M19 7l-3 6h6z"/><path d="M5 7h14"/>
  {% elif icon == "archive" %}
    <rect x="3" y="4" width="18" height="4" rx="1"/>
    <path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/>
  {% elif icon == "book" %}
    <path d="M4 4h11a2 2 0 0 1 2 2v14a2 2 0 0 0-2-2H4z"/>
    <path d="M20 6v14a2 2 0 0 0-2-2"/>
  {% else %}
    <circle cx="12" cy="12" r="9"/>
  {% endif %}
</svg>
