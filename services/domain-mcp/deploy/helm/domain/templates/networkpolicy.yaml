{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "domain.fullname" . }}
  labels:
    {{- include "domain.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "domain.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    # Tráfico desde el mismo namespace (e.g. ingress controller)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
    {{- with .Values.networkPolicy.ingressFromNamespaces }}
    # Tráfico desde namespaces explícitamente autorizados
    - from:
        {{- range . }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ $.Values.service.port }}
    {{- end }}
    # Prometheus scrape
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.metricsPort }}
  egress:
    # DNS interno cluster
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Postgres (mismo namespace o cluster)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Egress general (LLM providers, SMTP) — restrict en prod
    {{- with .Values.networkPolicy.egressToCIDRs }}
    - to:
        {{- range . }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 587
    {{- end }}
{{- end }}
