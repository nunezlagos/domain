{% load static %}<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Domain Admin - Login{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'css/variables.css' %}">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/layout.css' %}">
  <link rel="stylesheet" href="{% static 'css/components.css' %}">
</head>
<body>
  <div class="auth-layout">
    {% if messages %}
      <div class="toast-container">
        {% for message in messages %}
          {% include "components/_alert.html" with message=message %}
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </div>

  <script>
    document.querySelectorAll('.alert[data-auto-dismiss]').forEach(function(a) {
      setTimeout(function() {
        a.style.transition = 'opacity 0.3s';
        a.style.opacity = '0';
        setTimeout(function() { a.remove(); }, 300);
      }, 5000);
    });
  </script>
</body>
</html>
