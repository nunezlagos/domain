notes: |
  Migration 000030_create_invitations + internal/service/invite.

  Tabla invitations: id UUID, organization_id FK, invited_by_user_id FK,
  email, role (CHECK admin/maintainer/member/viewer), token UUID UNIQUE,
  status (CHECK pending/accepted/declined/expired/revoked), expires_at
  DEFAULT NOW()+7d, accepted_user_id FK nullable, created/updated/deleted_at.
  UNIQUE PARTIAL (organization_id, email) WHERE status='pending' impide
  doble invite simultáneo.

  Service:
  - Create(orgID, invitedBy, email, role): valida role + email, INSERT,
    envía email via Mailer (HU-20.2 SMTP futuro), audit "invitation.sent"
  - GetByToken: lookup en cualquier status (UI puede mostrar "venció")
  - Accept(token, authedEmail, name): tx con SELECT ... FOR UPDATE, valida
    pending + no expirada + email match, UPSERT user en org, marca accepted,
    audit "invitation.accepted". Si encuentra expirada al intentar, transiciona
    status a expired y retorna ErrExpired.
  - Decline(token): UPDATE status='declined' WHERE status='pending'
  - Revoke(id, actor): UPDATE status='revoked' + audit "invitation.revoked"
  - ExpireOverdue: job diario transiciona pending vencidas a 'expired'
  - ListByOrg: listado para UI admin

  Tests integration (10 escenarios + 2 sabotaje):
  - Create envía email con token + audit emitido
  - InvalidRole rechazado
  - Doble pending bloqueado por unique partial index
  - Accept válido crea user + transiciona a accepted
  - Email mismatch rechazado
  - Expirada transiciona status + ErrExpired
  - Decline marca declined sin crear user
  - Revoke + accept posterior falla con ErrNotPending
  - ExpireOverdue solo expira las vencidas
  - sabotaje DoubleAccept rechazado
  - sabotaje PendingUnique constraint efectivo

  Pending:
  - HTTP handlers /api/v1/organizations/:id/invitations/* y
    /api/v1/invitations/:token/{accept,decline}, /:id/revoke
  - Hook al verify-otp de HU-02.7 para que en aceptación incluya API key
    en respuesta (is_first: true) — coordinación cross-service
  - Email templates HU-20.2 (subject/body actuales son ASCII placeholder)
  - Optional RUT capture en form de aceptación (UI, no service)
