<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Domain Admin 3D">
  <defs>
    <radialGradient id="sphere" cx="0.36" cy="0.30" r="0.8">
      <stop offset="0" stop-color="#cfe6f1"/>
      <stop offset="0.4" stop-color="#79aec8"/>
      <stop offset="1" stop-color="#2e5a72"/>
    </radialGradient>
    <radialGradient id="sphereCore" cx="0.36" cy="0.30" r="0.85">
      <stop offset="0" stop-color="#eaf5fa"/>
      <stop offset="0.4" stop-color="#86b9d0"/>
      <stop offset="1" stop-color="#306080"/>
    </radialGradient>
    <linearGradient id="ring3d" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9cc6da"/>
      <stop offset="0.5" stop-color="#447e9b"/>
      <stop offset="1" stop-color="#264f66"/>
    </linearGradient>
    <filter id="drop" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.1" flood-color="#16323f" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#drop)">
    <!-- anillo 3D (detras de los nodos) -->
    <circle cx="24" cy="24" r="18" fill="none" stroke="url(#ring3d)" stroke-width="3"/>
    <!-- brillo superior del aro -->
    <path d="M 10.2 12.4 A 18 18 0 0 1 37.8 12.4" fill="none" stroke="#dceef6" stroke-width="0.9" stroke-linecap="round" opacity="0.6"/>
    <!-- conexiones tubulares -->
    <line x1="24" y1="6" x2="24" y2="42" stroke="url(#ring3d)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="6" y1="24" x2="42" y2="24" stroke="url(#ring3d)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- esferas exteriores -->
    <circle cx="24" cy="6" r="4.6" fill="url(#sphere)"/>
    <circle cx="42" cy="24" r="4.6" fill="url(#sphere)"/>
    <circle cx="24" cy="42" r="4.6" fill="url(#sphere)"/>
    <circle cx="6" cy="24" r="4.6" fill="url(#sphere)"/>
    <!-- esfera central -->
    <circle cx="24" cy="24" r="6.2" fill="url(#sphereCore)"/>
    <!-- highlights especulares -->
    <ellipse cx="22.6" cy="4.5" rx="1.3" ry="1" fill="#fff" opacity="0.55"/>
    <ellipse cx="40.6" cy="22.5" rx="1.3" ry="1" fill="#fff" opacity="0.55"/>
    <ellipse cx="22.6" cy="40.5" rx="1.3" ry="1" fill="#fff" opacity="0.55"/>
    <ellipse cx="4.6" cy="22.5" rx="1.3" ry="1" fill="#fff" opacity="0.55"/>
    <ellipse cx="22.1" cy="21.9" rx="1.7" ry="1.3" fill="#fff" opacity="0.6"/>
  </g>
</svg>
