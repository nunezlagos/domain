notes: |
  internal/service/search.Service unifica búsqueda cross-entity sobre
  observations + prompts + sessions con scoping por organization_id.

  Search(orgID, query, limit, Filter) → []Result:
  - Cada entity ejecuta su propio FTS (ts_rank sobre content_tsv / body_tsv /
    summary_tsv) con LIMIT por entity = limit total
  - Merge insertion sort por score DESC, truncate a limit
  - Filter opcional: EntityTypes, ProjectIDs, Tags (AND), DateFrom/DateTo
  - Filter.Tags solo aplica a observations (los otros entities tienen
    estructura distinta; ampliar en HU futura)

  RBAC: scope por organization_id en el WHERE de cada query. NO hay
  RBAC granular por project todavía (issue-02.8 custom-roles pending).

  Result include: EntityType, ID, Title, Snippet (truncado 200), Score,
  ProjectID, Tags, CreatedAt, MatchedTerms.

  HTTP handler:
  - GET /api/v1/search   ?q= &limit= &entity_type=csv &project_slug=csv
                         &tags=csv &date_from= &date_to=
  Reemplaza el handler observation-only previo. Si solo se busca observation
  con vector similarity → usar ObsService.SearchHybrid directamente.

  MCP tool:
  - domain_search_global(query, limit?, entity_types[], tags[])

  Tests integration (5 escenarios + 1 sabotaje):
  - Search 3 entity types con misma palabra clave (pgvector) → 1+ por type
  - Query vacío → ErrEmptyQuery
  - Filter EntityTypes restringe a prompt-only
  - Filter Tags solo devuelve observations con ese tag
  - Filter DateFrom futuro → 0 resultados
  - sabotaje cross-org → 0 resultados

  Actualización 2026-06-11: knowledge_docs SÍ está incluido en el search
  unificado (searchKnowledgeDocs sobre body_tsv) — la nota previa estaba
  stale. Son 4 entity types: observation, prompt, session, knowledge_doc.

  Diferido (decisión MCP-first 2026-06-10, ver tasks.md):
  - MV searchable_entities + cron refresh (FTS per-entity con GIN alcanza)
  - saved_searches + suggestions pg_trgm (features de Web UI)
  - Hybrid scoring BM25+vector (SearchHybrid existe para observations)
  - Benchmark p99 <500ms con 100k entries
