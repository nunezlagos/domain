notes: |
  deploy/helm/domain con templates K8s estándar:

  - Chart.yaml v2: name=domain, version=0.1.0 (chart SemVer independiente
    de appVersion del binario)
  - values.yaml con defaults producción + comentarios
  - _helpers.tpl con domain.name/fullname/labels/selectorLabels/image
  - deployment.yaml con:
    * envFrom ConfigMap + env secretKeyRef explícitos
    * Probes liveness/readiness/startup
    * SecurityContext nonRoot + readOnlyRootFS + drop ALL caps
    * Volume tmp emptyDir
    * RollingUpdate maxSurge=1 maxUnavailable=0
    * Anti-affinity preferida por hostname
    * checksum/config annotation para restart en ConfigMap change
  - service.yaml: ClusterIP http + service separado para metrics
  - configmap.yaml con .Values.env (no-secret)
  - serviceaccount.yaml (toggle create)
  - hpa.yaml: autoscaling v2 CPU+memory 70%/80% con stabilization windows
  - networkpolicy.yaml: ingress same-ns + Prometheus + DNS + Postgres egress
  - migrations-job.yaml: pre-upgrade hook que corre `domain migrate up` antes
    del rollout pods con backoffLimit + ttlSecondsAfterFinished
  - servicemonitor.yaml (Prometheus Operator) toggle .serviceMonitor.enabled
  - NOTES.txt con comandos de verificación + ejemplo OTP

  Secrets externos referenciados (NO commitear con secrets):
  - domain-db con DOMAIN_DATABASE_URL + DOMAIN_DATABASE_AUTH_URL
  - domain-llm-keys con DOMAIN_ANTHROPIC_KEY + DOMAIN_OPENAI_KEY (opcional)
  - domain-smtp con USER + PASSWORD (opcional)

  Pending:
  - helm lint en CI (instalar helm en .github/workflows/ci.yml)
  - Helm chart push OCI a ghcr.io/nunezlagos/charts (release.yml)
  - PodDisruptionBudget para garantizar minAvailable
  - Vertical Pod Autoscaler (recomendación, no scale)
  - PgBouncer sidecar opcional (HU-25.1)
  - Multi-tenant namespacing
