  internal/secrets/rotation.go:
  - GeneratePassword(nBytes) → base64url-safe 32 bytes = 256 bits entropy
  - Rotator.RotateRole(ctx, role) ejecuta ALTER ROLE <role> PASSWORD <new>
  - isValidRoleName valida lowercase + digits + underscore (anti-injection)
  - pgQuoteIdent escapa identifier con double-quote
  - pgQuoteLiteral usa dollar-quoted $domain_pw$ para passwords con chars especiales

  Subcomando CLI: domain rotate-db-password [--role app_user]
  - Genera password
  - Aplica ALTER ROLE
  - Imprime password a stdout (pipe-friendly para Secret Manager)
  - Mensaje a stderr con next steps

