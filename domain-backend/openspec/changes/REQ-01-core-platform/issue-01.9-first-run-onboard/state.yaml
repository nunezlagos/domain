notes: |
  HU-01.9 implementada en 7 commits atomicos sobre branch
  feat/req-25.5-rls-wiring. Cubre los 4 entry points del onboard:

  1. CLI standalone: ./bin/domain onboard
     Wizard TUI minimalista (bufio.Scanner, sin charmbracelet) que
     detecta first-run, dispara bootstrap u OTP, guarda
     credenciales en ~/.config/domain/credentials.json (chmod 600),
     opcionalmente configura opencode.

  2. Slash command: /domain-login
     .md con frontmatter (description, agent) que se instala en
     ~/.config/opencode/commands/ y ~/.claude/commands/ cuando se
     corre 'domain setup [agent]'. El agente ejecuta el binario
     domain onboard via Bash tool, el user responde los prompts, el
     agente solo confirma 'logged in' (NO expone la API key).

  3. Enforcement al instalar herramienta:
     cmd/domain-mcp/main.go retorna exit 1 con mensaje claro
     ('Run domain onboard or /domain-login') si la API key falta
     o es invalida. El agente NO puede llamar tools hasta
     autenticarse correctamente.

  4. Persistencia sin expiracion automatica:
     La columna api_keys.expires_at es nullable. Confirmado que
     la API key dura hasta que el user la revoque manualmente.

  Componentes entregados:
    1. internal/auth/bootstrap/service.go + service_test.go
       (9 unit tests) — endpoint con advisory lock
    2. internal/api/handler/bootstrap.go + bootstrap_test.go
       (5 unit tests) — handlers HTTP
    3. internal/cli/onboard/wizard.go + wizard_test.go
       (18 unit tests) — TUI wizard
    4. internal/cli/setup/targets.go — InstallSlashCommand +
       CommandsDir + DomainLoginCommandContent
    5. cmd/domain/main.go: nuevo subcommand onboard + bootstrap
       wiring + findDomainMCPSibling
    6. cmd/domain-mcp/main.go: enforcement con /domain-login hints
    7. docs/GETTING_STARTED.md: nueva seccion 4) Onboard

  Tests: 32 unit tests verde, 91 paquetes OK, 0 fallos.

  Bugfix bonus: elimine la referencia a 'domain dev_bootstrap' que
  llamaba a una funcion inexistente (runDevBootstrap no estaba
  definida). Bug latente que nadie habia detectado porque nadie
  corria ese subcommand en CI.
