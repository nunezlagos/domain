  === BUG CRITICO ENCONTRADO EN TEST FUNCIONAL 2026-06-11 ===

  El wireup HTTP del middleware (introducido en commit 3/6 de la HU-25.14)
  abria una tx con SET LOCAL app.current_org_id pero hacia defer Rollback
  SIEMPRE. Esto significaba que CUALQUIER write via HTTP (POST obs, etc)
  se rolled back al final del request, retornando 201 al cliente pero sin
  persistir nada en la DB.

  FIX en commit 20f79fc: status-based commit usando statusRecorder.
    - status < 500 (2xx, 3xx, 4xx) → Commit
    - status >= 500 (5xx) → Rollback

  Esto preserva la semantica RLS Y permite que los writes persistan.
  Verificado end-to-end con curl + DB real:
    - POST /api/v1/observations → 201 + row en DB ✓
    - Cross-org RLS: org A ve sus 2 obs, org B ve 0 ✓

  LECCION: 60+ unit tests del middleware pasaban porque testeaban
  el path exitoso del wireup (status, response), no la persistencia.
  Test funcional end-to-end con curl + DB real lo destapo.
