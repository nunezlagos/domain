<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#2b2b2b" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Domain Admin">
  <mask id="holesGlobe" maskUnits="userSpaceOnUse" x="0" y="0" width="48" height="48">
    <rect x="0" y="0" width="48" height="48" fill="white"/>
    <circle cx="9" cy="24" r="3.6" fill="black"/>
    <circle cx="39" cy="24" r="3.6" fill="black"/>
    <circle cx="24" cy="9" r="3.6" fill="black"/>
    <circle cx="24" cy="39" r="3.6" fill="black"/>
    <circle cx="24" cy="24" r="4.6" fill="black"/>
  </mask>
  <!-- base estatica -->
  <g mask="url(#holesGlobe)">
    <polygon points="24,9 39,24 24,39 9,24"/>
    <line x1="9" y1="24" x2="39" y2="24" />
    <line x1="24" y1="9" x2="24" y2="39" />
    <circle cx="24" cy="24" r="15"/>
  </g>
  <!-- nodos -->
  <circle cx="9" cy="24" r="3.6" />
  <circle cx="39" cy="24" r="3.6" />
  <circle cx="24" cy="9" r="3.6" />
  <circle cx="24" cy="39" r="3.6" />
  <circle cx="24" cy="24" r="4.6" />
  <!-- pulsos de informacion entre nodos -->
  <g fill="#447e9b" stroke="none">
    <circle r="1.1">
      <animateMotion dur="5s" repeatCount="indefinite" path="M24,9 L39,24 L24,39 L9,24 Z"/>
    </circle>
    <circle r="1.1">
      <animateMotion dur="5s" begin="2.5s" repeatCount="indefinite" path="M24,9 L39,24 L24,39 L9,24 Z"/>
    </circle>
    <circle r="1.1" opacity="0">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M9,24 L39,24"/>
      <animate attributeName="opacity" dur="2.2s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    </circle>
    <circle r="1.1" opacity="0">
      <animateMotion dur="2.2s" begin="1.1s" repeatCount="indefinite" path="M24,9 L24,39"/>
      <animate attributeName="opacity" dur="2.2s" begin="1.1s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.15;0.85;1"/>
    </circle>
  </g>
</svg>
