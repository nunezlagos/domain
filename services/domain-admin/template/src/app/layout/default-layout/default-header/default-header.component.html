<!-- Header plain (sin c-header para evitar la clase .header de CoreUI
     que mete `display: flex; justify-content: space-between` y rompe
     el layout. Usamos <header> nativo con clases Bootstrap. -->
<header
  class="bg-body border-bottom mb-4 d-print-none position-sticky top-0"
  style="position: sticky; top: 0; z-index: 1020; display: block; width: 100%;"
>
  <div
    class="px-4 w-100"
    style="display: flex; align-items: center; gap: 0.5rem; height: 56px;"
  >
    <button
      [cSidebarToggle]="sidebarId()"
      cHeaderToggler
      class="btn flex-shrink-0"
      toggle="visible"
      style="margin-inline-start: -14px;"
      aria-label="Toggle sidebar navigation"
    >
      <svg cIcon name="cilMenu" size="lg"></svg>
    </button>

    <!-- Spacer que empuja el nav a la derecha -->
    <div style="flex: 1 1 auto; min-width: 0;"></div>

    <!-- Nav derecho: theme + avatar en línea -->
    <ul
      class="d-flex align-items-center list-unstyled mb-0"
      style="gap: 0.5rem; flex: 0 0 auto;"
    >
      <!-- Theme picker (light / dark / auto) -->
      <li style="display: inline-flex; align-items: center;">
        <ng-container *ngTemplateOutlet="themeDropdown" />
      </li>

      <li class="nav-item py-1 d-none d-md-flex">
        <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
      </li>

      <!-- User avatar + dropdown (al final = derecha del todo) -->
      <li style="display: inline-flex; align-items: center;">
        <ng-container *ngTemplateOutlet="userDropdown" />
      </li>
    </ul>
  </div>
</header>

<!-- Theme picker dropdown (sin cambios) -->
<ng-template #themeDropdown>
  <c-dropdown alignment="end" variant="nav-item">
    <button [caret]="false" cDropdownToggle aria-label="Cambiar tema">
      <svg cIcon [name]="themeIcon()" size="lg"></svg>
    </button>
    <div cDropdownMenu>
      @for (mode of colorModes; track mode.name) {
        <button
          (click)="setTheme(mode.name)"
          [class.active]="colorMode() === mode.name"
          cDropdownItem
          class="d-flex align-items-center">
          <svg cIcon class="me-2" [name]="mode.icon" size="lg"></svg>
          {{ mode.text }}
        </button>
      }
    </div>
  </c-dropdown>
</ng-template>

<!-- User dropdown (sin cambios) -->
<ng-template #userDropdown>
  <c-dropdown [popperOptions]="{ placement: 'bottom-end' }" variant="nav-item">
    <button [caret]="true" cDropdownToggle class="py-0" aria-label="Abrir menú de usuario">
      <c-avatar
        shape="rounded-1"
        size="md"
        [textColor]="'primary'"
        [status]="'success'"
        [alt]="user()?.name ?? 'User'">
        {{ userInitials() }}
      </c-avatar>
    </button>
    <ul cDropdownMenu class="pt-0" style="min-width: 240px;">
      <li>
        <h6 cDropdownHeader class="bg-body-secondary text-body-secondary fw-semibold py-2 rounded-top">
          {{ user()?.name ?? 'Sin sesión' }}
        </h6>
      </li>
      <li>
        <h6 cDropdownHeader class="text-body-secondary small fw-normal py-1 d-flex align-items-center gap-2">
          {{ user()?.email }}
          @if (activeRole(); as r) {
            <span class="badge bg-primary">{{ r.name }}</span>
          }
        </h6>
      </li>
      <li><hr cDropdownDivider /></li>
      <li>
        <a cDropdownItem routerLink="/admin/settings">
          <svg cIcon class="me-2" name="cilSettings"></svg>
          Settings
        </a>
      </li>
      <li><hr cDropdownDivider /></li>
      <li>
        <button cDropdownItem (click)="logout()" type="button">
          <svg cIcon class="me-2" name="cilAccountLogout"></svg>
          Logout
        </button>
      </li>
    </ul>
  </c-dropdown>
</ng-template>
