{% if total > per_page %}
<div class="d-flex gap-2 mt-3" style="justify-content: center; align-items: center;">
  {% if has_prev %}
    <a href="?page={{ page|add:-1 }}{% if search %}&q={{ search }}{% endif %}#projects-table-area" class="btn btn-ghost btn-sm" data-page-link="{{ page|add:-1 }}">
      ← Anterior
    </a>
  {% endif %}
  <span class="text-secondary">
    Página {{ page }} de {{ total_pages }}
  </span>
  {% if has_next %}
    <a href="?page={{ page|add:1 }}{% if search %}&q={{ search }}{% endif %}#projects-table-area" class="btn btn-ghost btn-sm" data-page-link="{{ page|add:1 }}">
      Siguiente →
    </a>
  {% endif %}
</div>
{% endif %}
