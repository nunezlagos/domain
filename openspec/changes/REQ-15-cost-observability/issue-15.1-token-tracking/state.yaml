notes: |
  Schema base ya disponible en agent_runs (tokens_input, tokens_output, cost_usd,
  finished_at, started_at). Agent runner persiste estos campos al completar.

  Migration 000037 crea vistas agregadas para queries rápidas:
  - domain_cost_daily_by_org (per día por organización)
  - domain_cost_daily_by_agent (per día por agente)

  internal/service/cost/service.go expone DailyByOrg/DailyByAgent.

  HTTP: GET /api/v1/cost/daily?days=N&group_by=org|agent

  Cerrado:
  - Métricas Prometheus domain_llm_tokens_total + domain_cost_usd_total
    (counter por provider/model/direction) implementadas en issue-15.3
  - Vistas con índice: migration 000038 añade agent_runs_org_day_idx +
    agent_runs_cost_view_idx para acelerar las queries de las vistas
  - Window functions: LAG(cost_usd) para diff vs período previo incluido
    en DailyByOrg (PrevCostUSD + CostChangePCT)
  - issue-15.3 usage alerts como HU separada
