notes: |
  Dockerfile multi-stage:
  - Stage builder: golang:1.25-alpine compila ambos binarios con
    CGO_ENABLED=0, ldflags -s -w + Version/Commit/BuildTime injectados.
  - Stage runtime: gcr.io/distroless/static-debian12:nonroot (~22MB).
  - HEALTHCHECK CMD ["domain", "healthcheck"] cada 30s.
  - USER nonroot:nonroot.
  - EXPOSE 8000.

  .dockerignore excluye: .git, .github, .claude, docs, openspec, tests,
  .env files, etc. para build minimal.

  Build via goreleaser docker para multi-arch (amd64 + arm64):
  - ghcr.io/nunezlagos/domain:{version}-amd64 / -arm64
  - manifest combinado :{version} y :latest
  - cosign sign keyless en cada image

