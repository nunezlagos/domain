notes: |
  internal/anonymizer/ package:
  - types.go: Rule enum (passthrough/faker_email/faker_name/faker_rut/
    faker_phone/redact_content/nullify/json_redact), Config{Seed,Tables,
    SensitiveJSONKeys}, TableConfig{Skip,Columns}, DefaultConfig() con
    políticas para todas las tablas PII identificadas en security.md.
  - fakers.go: FakerEmail/Name/OrgName/Phone/RUT determinísticos por seed+idx
    + lookup tables (20 nombres, 15 apellidos, 15 palabras org).
    rutDV(n) computa DV módulo 11 correctamente.
  - jsonredact.go: RedactJSON walk recursivo con keys exactas o sufijos
    sensibles (_email, _rut, _phone, _password, _secret, _token, _apikey).
    Invalid JSON → passthrough.
  - anonymizer.go: Anonymizer{Src,Dst,Cfg,Logger}.Run(ctx) que enumera
    columnas via information_schema, SELECT * en src, transforma según
    Rules, INSERT en dst con ON CONFLICT DO NOTHING (idempotente).

  cmd/anonymize/main.go CLI:
    anonymize -src <DSN> -dst <DSN> [-seed N]

  Tabla policy DefaultConfig:
  - users → email/rut/name/phone fakers
  - organizations → name faker
  - observations → content redact (preserva hash)
  - audit_log → diff/new_values/old_values JSON redact
  - api_keys, otp_codes → Skip entera
  - outbound_webhook_subscriptions → secret_cipher = NULL

