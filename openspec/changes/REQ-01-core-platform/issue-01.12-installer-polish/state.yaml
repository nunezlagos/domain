  Bug latente critico detectado y arreglado durante el audit:
  - menu.Model.Update() retornaba Model (struct concreto), no tea.Model
    (interface). Eso significa que menu.Model NO implementaba tea.Model
    formalmente, y bubbletea no podria compilar el programa. Los unit
    tests pasaban porque usaban asserts directos, pero bubbletea fallaria
    en runtime. Fix: cambiar signature a (tea.Model, tea.Cmd) y agregar
    type assertion en app.go.

