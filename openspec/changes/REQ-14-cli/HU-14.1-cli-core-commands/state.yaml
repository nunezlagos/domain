notes: |
  CLI commands extendidos en internal/cli/{client,commands,output}/.

  Estructura: domain <resource> <action> [args] [flags]

  Recursos implementados:
  - projects: ls, get <slug>, create <slug> <name>
  - observations (alias obs): ls --project, save --project <content>
  - agents: ls, get <id>, run <id> <input>
  - flows: ls, run <id>
  - skills: ls [--type X] [--tag Y]
  - search: <query> [--limit N] [--type csv]
  - context: [--project <slug>]
  - policies: import-md <dir>, export-md [dir]
  - completion: bash|zsh|fish (genera shell completion script)

  Output formats:
  - json, table, yaml, csv
  - --no-headers, --quiet (-q)

  Cliente HTTP (internal/cli/client):
  - NewFromEnv (DOMAIN_API_KEY + DOMAIN_BASE_URL)
  - NewFromFile(path) para --config <path> YAML
  - ConfigFile struct con api_key + base_url, fallback a env vars

  HU-14.1 cerrado:
  - HU-14.2 output formats delegado y completado
  - HU-14.3 autocomplete dinámico como HU separada
  - --config flag soportado en todos los comandos
  - Tests E2E: restantes como tarea futura no bloqueante
