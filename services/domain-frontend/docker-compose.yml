# Frontend deploy VPS: build local (nginx + dist).
# Update: git pull + make build + make restart SVC=frontend.

services:
  domain-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: domain-frontend:local
    container_name: domain-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - domain_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  domain_internal:
    name: domain_internal
    external: true
