notes: |
  Migration 000036_create_idempotency_keys:
  - id BIGSERIAL, organization_id FK CASCADE, user_id FK
  - key VARCHAR(255), request_method/path, request_body_hash BYTEA
  - response_status/headers/body cached
  - expires_at default NOW()+24h
  - UNIQUE (org, key) garantiza no-duplicates

  internal/api/middleware/idempotency.go:
  - Wrap aplica solo a POST/PATCH/DELETE
  - Skip si no hay header Idempotency-Key
  - Skip si no hay principal autenticado (sin org context)
  - Lookup por (orgID, key) en BD:
    * Si existe y hash coincide → replay response cached + Idempotent-Replayed: true
    * Si existe y hash distinto → 409 idempotency_mismatch
    * Si no existe → ejecutar handler + store (solo si status<500)
  - responseRecorder captura status+headers+body para cachear
  - CleanupExpired job para drop keys vencidas

  Wire en cmd/domain server:
  - mux.Handle("/api/", authMW.Wrap(idempMW.Wrap(api.Router())))
  - Order: auth primero (necesita principal para org_id), idempotency segundo

  Pending:
  - Cron diario llama CleanupExpired (HU-10.1 wire)
  - Tests integration que verifican replay
  - Métricas Prometheus: domain_idempotency_replayed_total
  - HTTP 422 si Idempotency-Key formato inválido (validar UUID/nanoid)
  - HU-13.7 ETags caching (en este mismo commit por relacionado)
