notes: |
  internal/service/lifecycle.Service.Restore(entityType, id, actor, orgID).

  Tablas soportadas (con columna deleted_at):
  - organization, user, project, observation, session, prompt, knowledge_doc,
    skill, agent, invitation

  Lógica:
  1. Validar entityType en whitelist (ErrEntityNotSupported)
  2. SELECT deleted_at + organization_id de la tabla por id
  3. ErrNotFound si no existe o deleted_at IS NULL
  4. Cross-org guard: si orgID != entity.organization_id → ErrNotFound
  5. Retention window: ErrRetentionExpired si deleted_at < NOW() - 30 días
  6. UPDATE deleted_at = NULL
  7. Audit "entityType.restored"

  RetentionDays configurable per-Service (default 30).

  HTTP: POST /api/v1/restore body {entity_type, entity_id}

  Tests integration (5 escenarios + 1 sabotaje):
  - Restore project soft-deleted → revive
  - Restore sobre no-soft-deleted → ErrNotFound
  - Restore con entity_type inválido → ErrEntityNotSupported
  - Retention expired (60d) → ErrRetentionExpired
  - sabotaje cross-org → ErrNotFound
  - Idempotente: segunda Restore después de éxito → ErrNotFound (ya no soft)

  Pending:
  - HU-23.2.1 cron purge real a 30+N días (DROP rows definitivamente)
  - Cascade restore para entities child (restore project → restore obs/sessions
    asociadas si deleted_at coincide)
  - List soft-deleted endpoint para UI admin
