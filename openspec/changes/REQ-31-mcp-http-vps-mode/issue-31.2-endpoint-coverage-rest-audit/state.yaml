notes: >
  Cerrado por elimination (2026-06-14): con la implementacion de
  31.1 como HTTP-transport server-side (endpoint /mcp), las MCP
  tools SE EXPONEN VIA MCP nativo, no via REST equivalentes. Por
  ende NO se requiere mapping tool→REST 1:1; los clientes remotos
  hablan MCP Streamable HTTP directamente contra /mcp con las
  mismas tools que el binario stdio. La preocupacion original de
  "tools huerfanas que solo funcionan local" se resuelve porque
  ambos modos (stdio y HTTP) usan el mismo paquete
  internal/mcp/server (tools registradas una sola vez).
  Si en el futuro se decide exponer ademas tools via REST puro
  (sin protocolo MCP), reabrir este issue.
