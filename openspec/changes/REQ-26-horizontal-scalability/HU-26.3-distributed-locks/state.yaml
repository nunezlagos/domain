notes: |
  internal/dlock/ package con helper reutilizable de advisory locks:
  - HashKey(name string) int64 — SHA-256 first 8 bytes determinístico
  - Manager.TryAcquire(ctx, keyName) → (*Lock, bool, error) no-bloqueante
  - Manager.Acquire(ctx, keyName, maxWait) con polling 200ms hasta timeout
  - Lock.Release(ctx) idempotente, libera + retorna conn al pool
  - Manager.WithLock(ctx, keyName, fn) ejecuta fn si lock disponible (combo TryAcquire+defer Release)
  - Lock.HeldFor() para métricas/observabilidad

  Implementación:
  - Acquire saca conn dedicada del pool (pgxpool.Conn)
  - pg_try_advisory_lock(key int8) tomado FUERA de transaction
  - Si la conn cae (escenario 2), Postgres libera el lock automáticamente
  - Release ejecuta pg_advisory_unlock + retorna conn al pool

  Casos de uso ya existentes en el codebase que pueden migrar a este helper:
  - internal/scheduler/leader/leader.go (HU-26.2 leader election) — usa el mismo
    patrón pero hardcoded con LockKey constants. Puede refactorearse para
    compartir Manager.

  Tests dlock_test.go cubren HashKey (estabilidad + colisiones).

  Pending:
  - Métricas Prometheus: domain_dlock_acquired_total{key} + _failed_total +
    _held_duration_seconds histogram
  - Test integration con testcontainers (2 goroutines compitiendo por mismo lock)
  - Refactor internal/scheduler/leader/leader.go para usar dlock.Manager en
    lugar de SQL inline
  - Documentar incompat con PgBouncer transaction-pool — Manager requiere
    pool session-capable o conexión directa
  - Helper de namespace per-org: HashKey con prefix automático "org:{id}:..." para
    locks scoped por organización
